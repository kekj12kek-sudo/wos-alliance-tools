<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>T12研究ページ</title>
<style>
*{box-sizing:border-box}
body{margin:0;background:#111827;color:#fff;font-family:Arial,"Yu Gothic",Meiryo,sans-serif}
header{position:relative;background:#182235;border-bottom:1px solid #334155;padding:10px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
button,select{padding:10px 12px;border-radius:10px;border:1px solid #475569;background:#1f2937;color:#fff;font-weight:700;font-size:14px}
button.active{background:#b45309;border-color:#f59e0b}.goal.active{background:#166534;border-color:#22c55e}
.main{display:block;padding:10px;max-width:720px;margin:0 auto}
.stage{background:#0b1220;border:1px solid #334155;border-radius:12px;overflow:hidden;padding:6px}
#treeWrap{position:relative;display:block;line-height:0;width:100%}
#treeImage{display:block;width:100%;height:auto}
.marker{position:absolute;transform:translate(-50%,-50%);border-radius:50%;background:rgba(37,99,235,.20);border:2px solid rgba(255,255,255,.85);display:flex;align-items:center;justify-content:center;text-align:center;line-height:1.05;font-size:8px;font-weight:900;color:#fff;text-shadow:0 1px 3px #000;cursor:pointer;z-index:5;padding:0}
.marker:hover,.marker.selected{background:rgba(245,158,11,.42);border-color:#fde68a}
.side{background:#0f172a;border:1px solid #334155;border-radius:12px;padding:12px;margin-top:12px}
.node-editor{display:none;position:fixed;left:8px;right:8px;bottom:8px;z-index:100;background:#0f172a;border:2px solid #f59e0b;border-radius:16px;padding:12px;box-shadow:0 18px 50px rgba(0,0,0,.55);width:auto;max-height:45vh;overflow:auto}
.node-editor.open{display:block}
.node-editor h3{margin:0 0 10px}
.editor-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.editor-row label{display:block;color:#cbd5e1;font-size:12px;margin-bottom:4px}
.editor-row select{width:100%}
.editor-actions{display:flex;gap:8px;justify-content:flex-end}.editor-actions button{flex:1}
.editor-actions button{padding:8px 12px}
h2,h3{margin-top:0}
.info{color:#cbd5e1;line-height:1.6;font-size:14px}
.goal-result{background:#0b1220;border:1px solid #334155;border-radius:12px;padding:12px;margin-bottom:12px}
.goal-result h3{margin:0 0 8px;font-size:16px}
.tree-troops{display:flex;gap:8px;margin:0 0 10px;flex-wrap:wrap}
.total-box{background:#0b1220;border:1px solid #334155;border-radius:12px;padding:12px;margin-bottom:12px}
.result-table{width:100%;border-collapse:collapse;margin-top:8px}
.result-table th,.result-table td{border-bottom:1px solid #334155;padding:7px 4px;text-align:right;font-size:12px}
.result-table th:first-child,.result-table td:first-child{text-align:left}
.warn{color:#fbbf24;font-size:13px;line-height:1.5;margin-top:8px}
.count-tabs{display:flex;gap:8px;margin:8px 0 12px}
.count-tab{padding:8px 12px;border-radius:10px;border:1px solid #475569;background:#1f2937;color:#fff;font-weight:800;cursor:pointer}
.count-tab.active{background:#166534;border-color:#22c55e}
.material-grid{display:grid;grid-template-columns:1fr;gap:8px}
.material-card{background:#111827;border:1px solid #334155;border-radius:10px;padding:10px;display:flex;align-items:center;gap:10px}
.material-icon{width:34px;height:34px;object-fit:contain;flex:none}
.material-card .label{color:#94a3b8;font-size:12px}
.material-card .value{font-size:22px;font-weight:900;margin-top:2px}
@media(max-width:700px){.material-grid{grid-template-columns:1fr}}
.preset-box{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0 12px}
.preset-btn{padding:8px 10px;border-radius:10px;border:1px solid #475569;background:#1f2937;color:#fff;font-weight:800;cursor:pointer}
.preset-btn:hover{background:#334155}
.level-row{display:grid;grid-template-columns:1fr 90px 90px;gap:8px;align-items:center;padding:8px;border-bottom:1px solid #1f2937}
.level-row.active{background:#1e293b;outline:2px solid #f59e0b;border-radius:10px}
.level-row label{font-weight:700;font-size:13px}
.level-row select{width:100%;padding:7px}
@media(min-width:900px){.main{max-width:760px}.material-grid{grid-template-columns:repeat(3,1fr)}}

.quick-btn{
  position:absolute;
  transform:translate(-50%,-50%);
  border-radius:12px;
  border:2px solid #f59e0b;
  background:rgba(15,23,42,.88);
  color:#fff;
  font-weight:900;
  font-size:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  line-height:1.1;
  z-index:8;
  cursor:move;
  user-select:none;
  touch-action:none;
  box-shadow:0 4px 12px rgba(0,0,0,.45);
}
.quick-btn.selected{
  background:rgba(245,158,11,.82);
  border-color:#fde68a;
}
.adjust-panel{
  background:#0b1220;
  border:1px solid #334155;
  border-radius:12px;
  padding:12px;
  margin:12px 0;
}
.adjust-grid{
  display:grid;
  grid-template-columns:1fr;
  gap:10px;
}
.adjust-grid label{
  color:#cbd5e1;
  font-size:13px;
}
.adjust-grid input,.adjust-grid select{
  width:100%;
}
.coord-output{
  width:100%;
  min-height:120px;
  background:#020617;
  color:#86efac;
  border:1px solid #334155;
  border-radius:10px;
  padding:8px;
  font-size:12px;
  font-family:Consolas,monospace;
}

</style>
</head>
<body>
<header>
<strong style="width:100%;font-size:16px">T12研究ページ</strong>
<button class="goal active" data-goal="unlock">T12解放まで</button>
<button class="goal" data-goal="skill">スキル解放まで</button>
<button class="goal" data-goal="max">カンストまで</button>
</header>

<div class="main">
<section>
  <div class="goal-result">
    <h3>大枠目標の必要素材</h3>
    <div class="info">0ベースからの必要素材です。基本は1兵種分、タブで2兵種・3兵種の合計へ切替できます。</div>
    <div class="count-tabs">
      <button class="count-tab active" data-count="1">1兵種</button>
      <button class="count-tab" data-count="2">2兵種</button>
      <button class="count-tab" data-count="3">3兵種</button>
    </div>
    <div id="goalResult"></div>
  </div>
  <div class="total-box" style="margin-bottom:12px">
    <h3>詳細設定</h3>
    <div class="info">スキルツリー上のマーカーをタップして、現在Lvと目標Lvを設定します。入力後は「計算する」で詳細不足分へ移動します。</div>
  </div>

  <div class="adjust-panel">
    <h3>追加ボタン位置調整</h3>
    <div class="info">新規追加の横長ボタン4つだけ調整します。既存の丸マーカーは変更しません。</div>
    <div class="adjust-grid">
      <label>調整するボタン
        <select id="quickSelect"></select>
      </label>
      <label>横幅
        <input id="quickWidth" type="range" min="80" max="260" value="150">
      </label>
      <label>高さ
        <input id="quickHeight" type="range" min="28" max="80" value="42">
      </label>
      <button id="copyQuickJson">追加ボタン座標をコピー</button>
      <textarea id="quickJson" class="coord-output" readonly></textarea>
    </div>
  </div>

  <div class="tree-troops">
    <button class="troop active" data-troop="shield">盾</button>
    <button class="troop" data-troop="bow">弓</button>
    <button class="troop" data-troop="spear">槍</button>
  </div>
  <div class="stage">
  <div id="treeWrap">
    <img id="treeImage" src="S__123273220_0.jpg" alt="T12研究ツリー">
  </div>
</div>

  <div class="total-box" style="margin-top:12px">
    <h3>詳細設定の不足分</h3>
    <div class="info">スキルツリーで設定した現在Lvから目標Lvまでの不足分です。盾・弓・槍の合算も表示します。</div>
    <div id="totalResult"></div>
  </div>

</section>

<div id="nodeEditor" class="node-editor">
  <h3 id="editorTitle">研究設定</h3>
  <div class="editor-row">
    <div>
      <label>現在Lv</label>
      <select id="editorCurrent"></select>
      <button id="editorMaxCurrent" style="width:100%;margin-top:8px">カンスト済み</button>
    </div>
    <div>
      <label>目標Lv</label>
      <select id="editorTarget"></select>
      <button id="editorMaxTarget" style="width:100%;margin-top:8px">Lv MAX</button>
    </div>
  </div>
  <div class="editor-actions">
    <button id="editorCalc">計算する</button>
    <button id="editorClose">続けて入力</button>
  </div>
</div>
</div>

<script>

const ICONS = {
  refined: "S__123297796_0.jpg",
  particle: "S__123297797_0.jpg",
  steel: "S__123297798_0.jpg"
};

function materialCard(key, label, value){
  return `<div class="material-card">
    <img class="material-icon" src="${ICONS[key]}" alt="${label}">
    <div><div class="label">${label}</div><div class="value">${fmt(value)}</div></div>
  </div>`;
}

function fmtTime(days){
  if(!days || days <= 0) return "";
  return Math.ceil(days) + "D";
}

const GOAL_COSTS = {
  unlock: { label:"T12解放まで", steel:1620000, refined:440, particle:3080, time:0 },
  skill:  { label:"スキル解放まで", steel:4263000, refined:898, particle:6235, time:0 },
  max:    { label:"カンストまで", steel:17774250, refined:3895, particle:67944, time:0 }
};
let resultTroopCount = 1;


function renderGoalResult(){
  const c = GOAL_COSTS[goal];
  const count = resultTroopCount;
  document.getElementById("goalResult").innerHTML = `
    <div class="material-grid">
      ${materialCard("refined", "精錬火晶", c.refined * count)}
      ${materialCard("particle", "火晶微粒子", c.particle * count)}
      ${materialCard("steel", "鋼材", c.steel * count)}
      ${c.time ? `<div class="material-card"><div><div class="label">研究時間</div><div class="value">${fmtTime(c.time * count)}</div></div></div>` : ""}
    </div>
  `;
}


const COSTS = {
  unlock: { refined:440, particle:3080, steel:1620000, time:0 },
  ability1_each: { refined:77, particle:545, steel:510750, time:0 },
  skill: { refined:150, particle:975, steel:600000, time:0 },
  ability2_each: { refined:360, particle:5610, steel:1350000, time:0 },
  capacity: { refined:117, particle:1829, steel:611250, time:0 },
  ability3_each: { refined:360, particle:9360, steel:1875000, time:0 }
};

function costForNode(key, lv){
  lv = Number(lv) || 0;
  if(lv <= 0) return {refined:0, particle:0, steel:0};
  if(key === "unlock"){
    return scaleCost(COSTS.unlock, lv / 1);
  }
  if(key.startsWith("ability1_")){
    return scaleCost(COSTS.ability1_each, lv / 20);
  }
  if(key === "skill"){
    return scaleCost(COSTS.skill, lv / 3);
  }
  if(key.startsWith("ability2_")){
    return scaleCost(COSTS.ability2_each, lv / 50);
  }
  if(key === "capacity"){
    return scaleCost(COSTS.capacity, lv / 15);
  }
  if(key.startsWith("ability3_")){
    return scaleCost(COSTS.ability3_each, lv / 50);
  }
  return {refined:0, particle:0, steel:0};
}

function scaleCost(c, rate){
  return {
    refined: c.refined * rate,
    particle: c.particle * rate,
    steel: c.steel * rate,
    time: (c.time || 0) * rate
  };
}

function addCost(a,b){
  a.refined += b.refined || 0;
  a.particle += b.particle || 0;
  a.steel += b.steel || 0;
  a.time += b.time || 0;
  return a;
}

function fmt(n){
  if(n >= 100000000) return (n/100000000).toFixed(2).replace(/\.00$/,"") + "億";
  if(n >= 1000000) return (n/1000000).toFixed(2).replace(/\.00$/,"") + "M";
  return Math.ceil(n).toLocaleString("ja-JP");
}

function normalizePrereqFor(type){
  const s = state[troop];

  // スキル以上 → 解放 + 能力Ⅰ4種MAX
  if(s.skill[type] > 0 || hasAny(type, ["ability2_atk","ability2_def","ability2_leth","ability2_hp","capacity","ability3_atk","ability3_def","ability3_leth","ability3_hp"])){
    s.unlock[type] = Math.max(s.unlock[type], 1);
    ["ability1_atk","ability1_def","ability1_leth","ability1_hp"].forEach(k => s[k][type] = Math.max(s[k][type], 20));
  }

  // 能力Ⅱ以上 → スキルMAX
  if(hasAny(type, ["ability2_atk","ability2_def","ability2_leth","ability2_hp","capacity","ability3_atk","ability3_def","ability3_leth","ability3_hp"])){
    s.skill[type] = Math.max(s.skill[type], 3);
  }

  // 容量以上 → 能力Ⅱ4種MAX
  if(s.capacity[type] > 0 || hasAny(type, ["ability3_atk","ability3_def","ability3_leth","ability3_hp"])){
    ["ability2_atk","ability2_def","ability2_leth","ability2_hp"].forEach(k => s[k][type] = Math.max(s[k][type], 50));
  }

  // 能力Ⅲ → 容量MAX
  if(hasAny(type, ["ability3_atk","ability3_def","ability3_leth","ability3_hp"])){
    s.capacity[type] = Math.max(s.capacity[type], 15);
  }
}

function hasAny(type, keys){
  return keys.some(k => state[troop][k][type] > 0);
}

function shortageForTroop(t){
  const total = {refined:0, particle:0, steel:0, time:0};
  Object.keys(nodeName).forEach(k=>{
    const cur = state[t][k].current || 0;
    const tar = state[t][k].target || 0;
    const diff = Math.max(0, tar - cur);
    const c1 = costForNode(k, cur);
    const c2 = costForNode(k, cur + diff);
    addCost(total, {
      refined: c2.refined - c1.refined,
      particle: c2.particle - c1.particle,
      steel: c2.steel - c1.steel,
      time: c2.time - c1.time
    });
  });
  return total;
}

function renderTotalResult(){
  const rows = ["shield","bow","spear"].map(t=>{
    const r = shortageForTroop(t);
    return `<tr><td>${troopName[t]}</td><td>${fmt(r.refined)}</td><td>${fmt(r.particle)}</td><td>${fmt(r.steel)}</td><td>${fmtTime(r.time)}</td></tr>`;
  }).join("");

  const total = {refined:0, particle:0, steel:0, time:0};
  ["shield","bow","spear"].forEach(t=>addCost(total, shortageForTroop(t)));

  document.getElementById("totalResult").innerHTML = `
    <table class="result-table">
      <thead><tr><th>対象</th><th>精錬火晶</th><th>火晶微粒子</th><th>鋼材</th><th>研究時間</th></tr></thead>
      <tbody>
        ${rows}
        <tr style="font-weight:900;color:#86efac"><td>合計</td><td>${fmt(total.refined)}</td><td>${fmt(total.particle)}</td><td>${fmt(total.steel)}</td><td>${fmtTime(total.time)}</td></tr>
      </tbody>
    </table>
  `;
}

const layouts = {"shield": {"unlock": {"x": 50.11, "y": 6.99, "size": 160}, "ability1_atk": {"x": 11.56, "y": 23.97, "size": 139}, "ability1_def": {"x": 36.89, "y": 23.91, "size": 137}, "ability1_leth": {"x": 62.44, "y": 23.91, "size": 139}, "ability1_hp": {"x": 88.33, "y": 23.91, "size": 142}, "skill": {"x": 50, "y": 41.2, "size": 160}, "ability2_atk": {"x": 11.89, "y": 58.62, "size": 139}, "ability2_def": {"x": 37.11, "y": 58.56, "size": 136}, "ability2_leth": {"x": 62.56, "y": 58.68, "size": 139}, "ability2_hp": {"x": 88.22, "y": 58.56, "size": 141}, "capacity": {"x": 50.11, "y": 76.6, "size": 134}, "ability3_atk": {"x": 11.56, "y": 93.46, "size": 139}, "ability3_def": {"x": 37.11, "y": 93.27, "size": 137}, "ability3_leth": {"x": 62.67, "y": 93.46, "size": 142}, "ability3_hp": {"x": 88.33, "y": 93.46, "size": 142}}, "bow": {"unlock": {"x": 50.44, "y": 10.11, "size": 158}, "ability1_atk": {"x": 12.11, "y": 25.55, "size": 144}, "ability1_def": {"x": 37.56, "y": 25.42, "size": 147}, "ability1_leth": {"x": 62.89, "y": 25.42, "size": 143}, "ability1_hp": {"x": 88.33, "y": 25.61, "size": 149}, "skill": {"x": 50.44, "y": 42.54, "size": 158}, "ability2_atk": {"x": 12.22, "y": 59.09, "size": 141}, "ability2_def": {"x": 37.44, "y": 59.16, "size": 143}, "ability2_leth": {"x": 62.89, "y": 59.16, "size": 141}, "ability2_hp": {"x": 88, "y": 59.03, "size": 142}, "capacity": {"x": 50.22, "y": 76.08, "size": 141}, "ability3_atk": {"x": 12.11, "y": 92.45, "size": 141}, "ability3_def": {"x": 37.56, "y": 92.52, "size": 141}, "ability3_leth": {"x": 62.89, "y": 92.45, "size": 141}, "ability3_hp": {"x": 88.11, "y": 92.52, "size": 142}}, "spear": {"unlock": {"x": 49.89, "y": 10.13, "size": 160}, "ability1_atk": {"x": 12.11, "y": 26.58, "size": 143}, "ability1_def": {"x": 37.11, "y": 26.51, "size": 143}, "ability1_leth": {"x": 61.89, "y": 26.51, "size": 144}, "ability1_hp": {"x": 87.67, "y": 26.58, "size": 143}, "skill": {"x": 49.78, "y": 44.65, "size": 160}, "ability2_atk": {"x": 12.11, "y": 61.22, "size": 144}, "ability2_def": {"x": 37.11, "y": 61.16, "size": 144}, "ability2_leth": {"x": 61.56, "y": 61.28, "size": 144}, "ability2_hp": {"x": 87.44, "y": 61.28, "size": 144}, "capacity": {"x": 49.56, "y": 78.42, "size": 144}, "ability3_atk": {"x": 12.11, "y": 93.24, "size": 144}, "ability3_def": {"x": 37, "y": 93.18, "size": 144}, "ability3_leth": {"x": 61.78, "y": 93.18, "size": 144}, "ability3_hp": {"x": 87.44, "y": 93.05, "size": 144}}};
const imageMap = {
  shield:"S__123273220_0.jpg",
  bow:"S__123273221_0.jpg",
  spear:"S__123273222_0.jpg"
};
const troopName = {shield:"盾", bow:"弓", spear:"槍"};
const nodeName = {
  unlock:"T12解放",
  ability1_atk:"能力Ⅰ 攻撃",
  ability1_def:"能力Ⅰ 防御",
  ability1_leth:"能力Ⅰ 殺傷",
  ability1_hp:"能力Ⅰ HP",
  skill:"スキル",
  ability2_atk:"能力Ⅱ 攻撃",
  ability2_def:"能力Ⅱ 防御",
  ability2_leth:"能力Ⅱ 殺傷",
  ability2_hp:"能力Ⅱ HP",
  capacity:"容量",
  ability3_atk:"能力Ⅲ 攻撃",
  ability3_def:"能力Ⅲ 防御",
  ability3_leth:"能力Ⅲ 殺傷",
  ability3_hp:"能力Ⅲ HP"
};
const maxLv = {
  unlock:1, skill:3, capacity:15,
  ability1_atk:20, ability1_def:20, ability1_leth:20, ability1_hp:20,
  ability2_atk:50, ability2_def:50, ability2_leth:50, ability2_hp:50,
  ability3_atk:50, ability3_def:50, ability3_leth:50, ability3_hp:50
};
let troop = "shield";
let selected = "unlock";
let goal = "unlock";
const state = {
  shield: makeState(),
  bow: makeState(),
  spear: makeState()
};

function makeState(){
  const s = {};
  Object.keys(nodeName).forEach(k => s[k] = { current:0, target:0 });
  return s;
}

const goalPreset = {
  unlock: {
    unlock:1,
    ability1_atk:0, ability1_def:0, ability1_leth:0, ability1_hp:0,
    skill:0,
    ability2_atk:0, ability2_def:0, ability2_leth:0, ability2_hp:0,
    capacity:0,
    ability3_atk:0, ability3_def:0, ability3_leth:0, ability3_hp:0
  },
  skill: {
    unlock:1,
    ability1_atk:20, ability1_def:20, ability1_leth:20, ability1_hp:20,
    skill:3,
    ability2_atk:0, ability2_def:0, ability2_leth:0, ability2_hp:0,
    capacity:0,
    ability3_atk:0, ability3_def:0, ability3_leth:0, ability3_hp:0
  },
  max: {
    unlock:1,
    ability1_atk:20, ability1_def:20, ability1_leth:20, ability1_hp:20,
    skill:3,
    ability2_atk:50, ability2_def:50, ability2_leth:50, ability2_hp:50,
    capacity:15,
    ability3_atk:50, ability3_def:50, ability3_leth:50, ability3_hp:50
  }
};

const goalLabel = {
  unlock: "T12解放まで",
  skill: "スキル解放まで",
  max: "カンストまで"
};

function applyGoalToTroop(){
  const preset = goalPreset[goal];
  Object.keys(preset).forEach(k => {
    state[troop][k].target = preset[k];
  });
  normalizePrereqFor("target");
}

function applyPresetTo(type, presetName){
  const preset = goalPreset[presetName] || goalPreset.unlock;
  Object.keys(preset).forEach(k => {
    state[troop][k][type] = preset[k];
  });
  normalizePrereqFor(type);
  renderTable();
  focusRow(selected);
}

function setupPresetButtons(){
  document.querySelectorAll(".current-set").forEach(b=>b.addEventListener("click",()=>{
    applyPresetTo("current", b.dataset.current);
  }));
  document.querySelectorAll(".target-set").forEach(b=>b.addEventListener("click",()=>{
    applyPresetTo("target", b.dataset.target);
  }));
}

const wrap = document.getElementById("treeWrap");
const img = document.getElementById("treeImage");


const quickButtonName = {
  ability1_max: "能力Ⅰ\\nカンスト",
  skill_max: "スキル\\nカンスト",
  ability2_max: "能力Ⅱ\\nカンスト",
  capacity_max: "容量\\nカンスト"
};

const quickButtonData = {
  shield: {
    ability1_max:{x:50,y:32,w:150,h:42},
    skill_max:{x:50,y:49,w:150,h:42},
    ability2_max:{x:50,y:67,w:150,h:42},
    capacity_max:{x:50,y:84,w:150,h:42}
  },
  bow: {
    ability1_max:{x:50,y:33,w:150,h:42},
    skill_max:{x:50,y:50,w:150,h:42},
    ability2_max:{x:50,y:67,w:150,h:42},
    capacity_max:{x:50,y:84,w:150,h:42}
  },
  spear: {
    ability1_max:{x:50,y:34,w:150,h:42},
    skill_max:{x:50,y:52,w:150,h:42},
    ability2_max:{x:50,y:69,w:150,h:42},
    capacity_max:{x:50,y:85,w:150,h:42}
  }
};

let selectedQuick = "ability1_max";

function initQuickSelect(){
  const sel = document.getElementById("quickSelect");
  if(!sel) return;
  sel.innerHTML = Object.keys(quickButtonName).map(k =>
    `<option value="${k}">${quickButtonName[k].replace("\\n"," ")}</option>`
  ).join("");
  sel.value = selectedQuick;
  sel.addEventListener("change", e=>{
    selectedQuick = e.target.value;
    renderQuickButtons();
    syncQuickControls();
  });

  document.getElementById("quickWidth").addEventListener("input", e=>{
    quickButtonData[troop][selectedQuick].w = Number(e.target.value);
    renderQuickButtons();
    updateQuickJson();
  });
  document.getElementById("quickHeight").addEventListener("input", e=>{
    quickButtonData[troop][selectedQuick].h = Number(e.target.value);
    renderQuickButtons();
    updateQuickJson();
  });
  document.getElementById("copyQuickJson").addEventListener("click", async()=>{
    updateQuickJson();
    await navigator.clipboard.writeText(document.getElementById("quickJson").value);
    alert("コピー完了");
  });
}

function syncQuickControls(){
  const d = quickButtonData[troop][selectedQuick];
  const w = document.getElementById("quickWidth");
  const h = document.getElementById("quickHeight");
  if(w) w.value = d.w;
  if(h) h.value = d.h;
  updateQuickJson();
}

function updateQuickJson(){
  const out = document.getElementById("quickJson");
  if(!out) return;
  out.value = JSON.stringify({[troop]: quickButtonData[troop]}, null, 2);
}

function renderQuickButtons(){
  document.querySelectorAll(".quick-btn").forEach(x=>x.remove());
  Object.keys(quickButtonName).forEach(k=>{
    const d = quickButtonData[troop][k];
    const b = document.createElement("button");
    b.className = "quick-btn" + (k===selectedQuick ? " selected" : "");
    b.dataset.key = k;
    b.innerText = quickButtonName[k].replace("\\n", "\n");
    b.style.left = d.x + "%";
    b.style.top = d.y + "%";
    b.style.width = d.w + "px";
    b.style.height = d.h + "px";
    enableQuickDrag(b);
    wrap.appendChild(b);
  });
  syncQuickControls();
}

function enableQuickDrag(btn){
  let dragging = false;
  btn.addEventListener("pointerdown", e=>{
    selectedQuick = btn.dataset.key;
    dragging = true;
    btn.setPointerCapture(e.pointerId);
    renderQuickButtons();
    e.preventDefault();
  });
  btn.addEventListener("pointermove", e=>{
    if(!dragging) return;
    const r = wrap.getBoundingClientRect();
    const x = ((e.clientX-r.left)/r.width)*100;
    const y = ((e.clientY-r.top)/r.height)*100;
    quickButtonData[troop][selectedQuick].x = Math.round(Math.max(0,Math.min(100,x))*100)/100;
    quickButtonData[troop][selectedQuick].y = Math.round(Math.max(0,Math.min(100,y))*100)/100;
    renderQuickButtons();
    updateQuickJson();
  });
  btn.addEventListener("pointerup", ()=>dragging=false);
  btn.addEventListener("pointercancel", ()=>dragging=false);
}

function applyQuickAction(key){
  const map = {
    ability1_max:["ability1_atk","ability1_def","ability1_leth","ability1_hp"],
    skill_max:["skill"],
    ability2_max:["ability2_atk","ability2_def","ability2_leth","ability2_hp"],
    capacity_max:["capacity"]
  };
  (map[key] || []).forEach(n=>{
    state[troop][n].current = maxLv[n];
    state[troop][n].target = maxLv[n];
  });
  normalizePrereqFor("current");
  normalizePrereqFor("target");
  renderTotalResult();
}

function makeOptions(max){
  let s="";
  for(let i=0;i<=max;i++) s += `<option value="${i}">Lv${i}</option>`;
  return s;
}

function renderMarkers(){
  document.querySelectorAll(".marker").forEach(m=>m.remove());
  const layout = layouts[troop];
  Object.keys(nodeName).forEach(k=>{
    const p = layout[k];
    const m = document.createElement("button");
    m.className = "marker" + (k===selected ? " selected" : "");
    m.dataset.key = k;
    m.innerHTML = nodeName[k].replace(" ","<br>");
    m.style.left = p.x + "%";
    m.style.top = p.y + "%";
    const scale = document.getElementById("treeImage").clientWidth / 900;
    const displaySize = Math.max(32, p.size * scale);
    m.style.width = displaySize + "px";
    m.style.height = displaySize + "px";
    m.addEventListener("click",()=>{
      selected = k;
      renderMarkers();
      focusRow(k);
    });
    wrap.appendChild(m);
  });
  renderQuickButtons();
}

function renderTable(){
  renderTotalResult();
}

function focusRow(k){
  selected = k;
  renderMarkers();
  openEditor(k);
}


function makeEditorOptions(max, value){
  let s = "";
  for(let i=0;i<=max;i++){
    s += `<option value="${i}" ${i===value ? "selected" : ""}>Lv${i}${i===0 ? "（未解放）" : ""}</option>`;
  }
  return s;
}

function openEditor(k){
  const editor = document.getElementById("nodeEditor");
  document.getElementById("editorTitle").textContent = nodeName[k];
  const cur = document.getElementById("editorCurrent");
  const tar = document.getElementById("editorTarget");
  cur.innerHTML = makeEditorOptions(maxLv[k], state[troop][k].current);
  tar.innerHTML = makeEditorOptions(maxLv[k], state[troop][k].target);
  cur.onchange = e => {
    state[troop][k].current = Number(e.target.value);
    normalizePrereqFor("current");
    openEditor(k);
    renderTotalResult();
  };
  tar.onchange = e => {
    state[troop][k].target = Number(e.target.value);
    normalizePrereqFor("target");
    openEditor(k);
    renderTotalResult();
  };
  document.getElementById("editorMaxCurrent").onclick = () => {
    state[troop][k].current = maxLv[k];
    normalizePrereqFor("current");
    openEditor(k);
    renderTotalResult();
  };
  document.getElementById("editorMaxTarget").onclick = () => {
    state[troop][k].target = maxLv[k];
    normalizePrereqFor("target");
    openEditor(k);
    renderTotalResult();
  };
  editor.classList.add("open");
}

function closeEditor(){
  document.getElementById("nodeEditor").classList.remove("open");
}

function calculateAndScroll(){
  renderTotalResult();
  closeEditor();
  const result = document.getElementById("totalResult");
  if(result){
    result.scrollIntoView({behavior:"smooth", block:"start"});
  }
}


function switchTroop(t){
  troop = t;
  selected = "unlock";
  img.src = imageMap[troop];
  document.querySelectorAll(".troop").forEach(b=>b.classList.toggle("active", b.dataset.troop===troop));
  renderTable();
  renderMarkers();
  syncQuickControls();
  closeEditor();
}

document.querySelectorAll(".goal").forEach(b=>b.addEventListener("click",()=>{
  goal = b.dataset.goal;
  document.querySelectorAll(".goal").forEach(x=>x.classList.toggle("active", x.dataset.goal===goal));
  renderGoalResult();
  renderTable();
}));

document.querySelectorAll(".count-tab").forEach(b=>b.addEventListener("click",()=>{
  resultTroopCount = Number(b.dataset.count);
  document.querySelectorAll(".count-tab").forEach(x=>x.classList.toggle("active", x.dataset.count===String(resultTroopCount)));
  renderGoalResult();
}));

document.querySelectorAll(".troop").forEach(b=>b.addEventListener("click",()=>switchTroop(b.dataset.troop)));
document.getElementById("editorClose").addEventListener("click", closeEditor);
document.getElementById("editorCalc").addEventListener("click", calculateAndScroll);
setupPresetButtons();
initQuickSelect();

renderGoalResult();
renderTotalResult();
renderTable();
renderMarkers();
window.addEventListener("resize", renderMarkers);
document.getElementById("treeImage").addEventListener("load", renderMarkers);
</script>
</body>
</html>
