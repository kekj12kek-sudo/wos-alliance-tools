<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>T12研究ページ</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:#1a0a00;color:#fff;font-family:Arial,"Yu Gothic",Meiryo,sans-serif;font-size:15px}
header{background:#2a1400;border-bottom:2px solid #7c4a00;padding:10px;display:flex;gap:6px;align-items:center;flex-wrap:wrap}
header strong{width:100%;font-size:16px;color:#f59e0b}
button,select{padding:10px 12px;border-radius:10px;border:1px solid #7c4a00;background:#2a1400;color:#fff;font-weight:700;font-size:14px;touch-action:manipulation}
button.active{background:#b45309;border-color:#f59e0b}
.goal.active{background:#92400e;border-color:#f59e0b}
.main{display:block;padding:8px;max-width:600px;margin:0 auto}
.stage{background:#0d0600;border:2px solid #7c4a00;border-radius:12px;overflow:hidden;padding:4px}
#treeWrap{position:relative;display:block;line-height:0;width:100%}
#treeImage{display:block;width:100%;height:auto}
.marker{position:absolute;transform:translate(-50%,-50%);border-radius:50%;background:rgba(37,99,235,.20);border:2px solid rgba(255,255,255,.85);display:flex;align-items:center;justify-content:center;text-align:center;line-height:1.05;font-size:8px;font-weight:900;color:#fff;text-shadow:0 1px 3px #000;cursor:pointer;z-index:5;padding:0}
.marker:hover,.marker.selected{background:rgba(245,158,11,.55);border-color:#fde68a}
.node-editor{display:none;position:fixed;left:8px;right:8px;bottom:8px;z-index:100;background:#1a0a00;border:2px solid #f59e0b;border-radius:16px;padding:12px;box-shadow:0 18px 50px rgba(0,0,0,.7);max-height:45vh;overflow:auto}
.node-editor.open{display:block}
.node-editor h3{margin:0 0 10px;color:#f59e0b}
.editor-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.editor-row label{display:block;color:#fcd9a0;font-size:12px;margin-bottom:4px}
.editor-row select{width:100%}
.editor-actions{display:flex;gap:8px}
.editor-actions button{flex:1;padding:10px}
h2,h3{margin-top:0}
.info{color:#c9a87c;line-height:1.6;font-size:13px}
.goal-result{background:#120800;border:2px solid #7c4a00;border-radius:12px;padding:12px;margin-bottom:10px}
.goal-result h3{margin:0 0 8px;font-size:15px;color:#f59e0b}
.tree-troops{display:flex;gap:6px;margin:0 0 8px;flex-wrap:wrap}
.total-box{background:#120800;border:2px solid #7c4a00;border-radius:12px;padding:12px;margin-bottom:10px}
.result-table{width:100%;border-collapse:collapse;margin-top:8px}
.result-table th,.result-table td{border-bottom:1px solid #7c4a00;padding:7px 3px;text-align:right;font-size:12px}
.result-table th:first-child,.result-table td:first-child{text-align:left}
.result-table th{color:#f59e0b;font-size:11px}
.count-tabs{display:flex;gap:6px;margin:8px 0 12px}
.count-tab{padding:8px 14px;border-radius:10px;border:1px solid #7c4a00;background:#2a1400;color:#fff;font-weight:800;cursor:pointer;touch-action:manipulation}
.count-tab.active{background:#92400e;border-color:#f59e0b}
.material-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.material-card{background:#1e0d00;border:1px solid #7c4a00;border-radius:10px;padding:8px 10px;display:flex;align-items:center;gap:8px}
.material-icon{width:32px;height:32px;object-fit:contain;flex:none;image-rendering:auto}
.material-card .label{color:#c9a87c;font-size:11px}
.material-card .value{font-size:18px;font-weight:900;margin-top:1px;color:#fff}
.material-card.time-card{grid-column:1/-1}
.quick-btn{touch-action:none;-webkit-user-select:none;user-select:none;position:absolute;transform:translate(-50%,-50%);border-radius:10px;border:2px solid #f59e0b;background:rgba(26,10,0,.88);color:#fff;font-weight:900;font-size:11px;display:flex;align-items:center;justify-content:center;text-align:center;line-height:1.1;z-index:8;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.6)}
.quick-btn.selected{background:rgba(180,83,9,.88);border-color:#fde68a}
/* 兵種バー */
.troop-bar{display:flex;gap:0;margin:0 0 6px;border-radius:12px;overflow:hidden;border:2px solid #7c4a00}
.troop-bar .troop{flex:1;border-radius:0;border:none;border-right:1px solid #7c4a00;padding:12px 4px;font-size:15px;background:#2a1400;transition:background .15s}
.troop-bar .troop:last-child{border-right:none}
.troop-bar .troop.active{background:#92400e;color:#fde68a;font-weight:900}
/* エディター */
.editor-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.editor-header h3{margin:0;color:#f59e0b;font-size:15px}
.close-x{background:none;border:none;color:#94a3b8;font-size:20px;padding:4px 8px;cursor:pointer;border-radius:6px}
.lv-block{padding:8px;border-radius:10px}
.current-block{background:#0d2a0d;border:1px solid #166534}
.current-block label{color:#86efac !important;font-weight:700}
.target-block{background:#1a1200;border:1px solid #92400e}
.target-block label{color:#fde68a !important;font-weight:700}
.btn-current{width:100%;margin-top:8px;background:#166534;border-color:#22c55e;font-size:12px;padding:7px}
.btn-target{width:100%;margin-top:8px;background:#92400e;border-color:#f59e0b;font-size:12px;padding:7px}
/* 使い方説明リスト */
.info-list{margin:6px 0 10px;display:flex;flex-direction:column;gap:5px}
.info-item{font-size:13px;color:#c9a87c;padding:5px 8px;background:rgba(255,255,255,.04);border-radius:8px;border-left:3px solid #7c4a00;line-height:1.4}
/* テーブルアイコン */
.th-icon{width:16px;height:16px;vertical-align:middle;margin-right:2px;object-fit:contain}
</style>
</head>
<body>
<header>
<strong style="width:100%;font-size:16px">T12研究ページ</strong>

<div class="main">

      <div class="info-item">🔁 同じマーカーを再タップでキャンセル</div>
      <div class="info-item">✅ 研究済みの段階は「カンスト済み」ボタンで一括設定</div>

  </div>
<div class="troop-bar">
    <button class="troop active" data-troop="shield">🛡 盾兵</button>

  <div id="treeWrap">

  <div class="total-box" style="margin-top:12px">
    <h3>目標LVまでの消費アイテム数</h3>
    <div class="info-list">
  <div class="info-item">📊 各兵種の現在Lv→目標Lvに必要な素材数</div>
  <div class="info-item">➕ 合計行で盾・弓・槍の全合算を確認できます</div>
</div>
    <div id="totalResult"></div>

</section>

<div id="nodeEditor" class="node-editor">

  </div>
  <div class="editor-row">
    <div class="lv-block current-block">

    </div>

      <label>🎯 目標Lv</label>
      <select id="editorTarget"></select>
      <button id="editorMaxTarget" class="btn-target">↑ Lv MAX</button>
    </div>
  </div>
  <div class="editor-actions">
    <button id="editorCalc">📊 計算する</button>
    <button id="editorClose">続けて入力</button>
  </div>
</div>
</div>

<script>

const ICONS = {
  refined: "refined.png",
  particle: "particle.png",
  steel: "steel.png"
};

function materialCard(key, label, value){
  return `<div class="material-card">
    <img class="material-icon" src="${ICONS[key]}" alt="${label}">
    <div><div class="label">${label}</div><div class="value">${fmt(value)}</div></div>
  </div>`;
}

function fmtTime(sec){
  if(!sec || sec <= 0) return "";
  sec = Math.round(sec);
  const d = Math.floor(sec / 86400);
  const h = Math.floor((sec % 86400) / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = sec % 60;
  const hms = [h,m,s].map(v=>String(v).padStart(2,"0")).join(":");
  return d > 0 ? d + "D " + hms : hms;
}

const GOAL_COSTS = {
  unlock:   { label:"T12解放まで",   steel:1620000,  refined:440,  particle:3080,  time:0 },
  skill:    { label:"スキル解放まで", steel:4263000,  refined:898,  particle:6235,  time:10087200 },
  capacity: { label:"容量解放まで",   steel:10274250, refined:2456, particle:30504, time:24110640 },
  max:      { label:"カンストまで",   steel:17774250, refined:3895, particle:67944, time:76814640 }
};
let resultTroopCount = 1;


function renderGoalResult(){
  const c = GOAL_COSTS[goal];
  const count = resultTroopCount;
  document.getElementById("goalResult").innerHTML = `
    <div class="material-grid">
      ${materialCard("refined", "精錬火晶", c.refined * count)}
      ${materialCard("particle", "火晶微粒子", c.particle * count)}
      ${materialCard("steel", "鋼材", c.steel * count)}
      ${c.time ? `<div class="material-card time-card"><div><div class="label">⏱ 研究時間</div><div class="value" style="font-size:16px">${fmtTime(c.time * count)}</div></div></div>` : ""}
    </div>
  `;
}


const COSTS = {
  unlock:       { refined:440,  particle:3080,  steel:1620000, time:0 },
  ability1_each:{ refined:77,   particle:545,   steel:510750,  time:1225800 },
  skill:        { refined:150,  particle:975,   steel:600000,  time:5184000 },
  ability2_each:{ refined:360,  particle:5610,  steel:1350000, time:3240000 },
  capacity:     { refined:117,  particle:1829,  steel:611250,  time:1063440 },
  ability3_each:{ refined:360,  particle:9360,  steel:1875000, time:13176000 }
};

function costForNode(key, lv){
  lv = Number(lv) || 0;
  if(lv <= 0) return {refined:0, particle:0, steel:0, time:0};
  if(key === "unlock"){
    return scaleCost(COSTS.unlock, lv / 1);
  }
  if(key.startsWith("ability1_")){
    return scaleCost(COSTS.ability1_each, lv / 20);
  }
  if(key === "skill"){
    return scaleCost(COSTS.skill, lv / 3);
  }
  if(key.startsWith("ability2_")){
    return scaleCost(COSTS.ability2_each, lv / 50);
  }
  if(key === "capacity"){
    return scaleCost(COSTS.capacity, lv / 15);
  }
  if(key.startsWith("ability3_")){
    return scaleCost(COSTS.ability3_each, lv / 50);
  }
  return {refined:0, particle:0, steel:0, time:0};
}

function scaleCost(c, rate){
  return {
    refined: c.refined * rate,
    particle: c.particle * rate,
    steel: c.steel * rate,
    time: (c.time || 0) * rate
  };
}

function addCost(a,b){
  a.refined += b.refined || 0;
  a.particle += b.particle || 0;
  a.steel += b.steel || 0;
  a.time += b.time || 0;
  return a;
}

function fmt(n){
  if(n >= 100000000) return (n/100000000).toFixed(2).replace(/\.00$/,"") + "億";
  if(n >= 1000000) return (n/1000000).toFixed(2).replace(/\.00$/,"") + "M";
  return Math.ceil(n).toLocaleString("ja-JP");
}

function normalizePrereqFor(type){
  const s = state[troop];

  // スキル以上 → 解放 + 能力Ⅰ4種MAX
  if(s.skill[type] > 0 || hasAny(type, ["ability2_atk","ability2_def","ability2_leth","ability2_hp","capacity","ability3_atk","ability3_def","ability3_leth","ability3_hp"])){
    s.unlock[type] = Math.max(s.unlock[type], 1);
    ["ability1_atk","ability1_def","ability1_leth","ability1_hp"].forEach(k => s[k][type] = Math.max(s[k][type], 20));
  }

  // 能力Ⅱ以上 → スキルMAX
  if(hasAny(type, ["ability2_atk","ability2_def","ability2_leth","ability2_hp","capacity","ability3_atk","ability3_def","ability3_leth","ability3_hp"])){
    s.skill[type] = Math.max(s.skill[type], 3);
  }

  // 容量以上 → 能力Ⅱ4種MAX
  if(s.capacity[type] > 0 || hasAny(type, ["ability3_atk","ability3_def","ability3_leth","ability3_hp"])){
    ["ability2_atk","ability2_def","ability2_leth","ability2_hp"].forEach(k => s[k][type] = Math.max(s[k][type], 50));
  }

  // 能力Ⅲ → 容量MAX
  if(hasAny(type, ["ability3_atk","ability3_def","ability3_leth","ability3_hp"])){
    s.capacity[type] = Math.max(s.capacity[type], 15);
  }
}

function hasAny(type, keys){
  return keys.some(k => state[troop][k][type] > 0);
}

function shortageForTroop(t){
  const total = {refined:0, particle:0, steel:0, time:0};
  Object.keys(nodeName).forEach(k=>{
    const cur = state[t][k].current || 0;
    const tar = state[t][k].target || 0;
    const diff = Math.max(0, tar - cur);
    const c1 = costForNode(k, cur);
    const c2 = costForNode(k, cur + diff);
    addCost(total, {
      refined: c2.refined - c1.refined,
      particle: c2.particle - c1.particle,
      steel: c2.steel - c1.steel,
      time: (c2.time || 0) - (c1.time || 0)
    });
  });
  return total;
}

function renderTotalResult(){
  const rows = ["shield","bow","spear"].map(t=>{
    const r = shortageForTroop(t);
    return `<tr><td>${troopName[t]}</td><td>${fmt(r.refined)}</td><td>${fmt(r.particle)}</td><td>${fmt(r.steel)}</td><td>${fmtTime(r.time)}</td></tr>`;
  }).join("");

  const total = {refined:0, particle:0, steel:0, time:0};
  ["shield","bow","spear"].forEach(t=>addCost(total, shortageForTroop(t)));

  document.getElementById("totalResult").innerHTML = `
    <table class="result-table">
      <thead><tr><th>対象</th><th><img src="refined.png" class="th-icon">精錬</th><th><img src="particle.png" class="th-icon">微粒子</th><th><img src="steel.png" class="th-icon">鋼材</th><th>⏱時間</th></tr></thead>
      <tbody>
        ${rows}
        <tr style="font-weight:900;color:#86efac"><td>合計</td><td>${fmt(total.refined)}</td><td>${fmt(total.particle)}</td><td>${fmt(total.steel)}</td><td>${fmtTime(total.time)}</td></tr>
      </tbody>
    </table>
  `;
}

const layouts = {"shield": {"unlock": {"x": 50.11, "y": 6.99, "size": 160}, "ability1_atk": {"x": 11.56, "y": 23.97, "size": 139}, "ability1_def": {"x": 36.89, "y": 23.91, "size": 137}, "ability1_leth": {"x": 62.44, "y": 23.91, "size": 139}, "ability1_hp": {"x": 88.33, "y": 23.91, "size": 142}, "skill": {"x": 50, "y": 41.2, "size": 160}, "ability2_atk": {"x": 11.89, "y": 58.62, "size": 139}, "ability2_def": {"x": 37.11, "y": 58.56, "size": 136}, "ability2_leth": {"x": 62.56, "y": 58.68, "size": 139}, "ability2_hp": {"x": 88.22, "y": 58.56, "size": 141}, "capacity": {"x": 50.11, "y": 76.6, "size": 134}, "ability3_atk": {"x": 11.56, "y": 93.46, "size": 139}, "ability3_def": {"x": 37.11, "y": 93.27, "size": 137}, "ability3_leth": {"x": 62.67, "y": 93.46, "size": 142}, "ability3_hp": {"x": 88.33, "y": 93.46, "size": 142}}, "bow": {"unlock": {"x": 50.44, "y": 10.11, "size": 158}, "ability1_atk": {"x": 12.11, "y": 25.55, "size": 144}, "ability1_def": {"x": 37.56, "y": 25.42, "size": 147}, "ability1_leth": {"x": 62.89, "y": 25.42, "size": 143}, "ability1_hp": {"x": 88.33, "y": 25.61, "size": 149}, "skill": {"x": 50.44, "y": 42.54, "size": 158}, "ability2_atk": {"x": 12.22, "y": 59.09, "size": 141}, "ability2_def": {"x": 37.44, "y": 59.16, "size": 143}, "ability2_leth": {"x": 62.89, "y": 59.16, "size": 141}, "ability2_hp": {"x": 88, "y": 59.03, "size": 142}, "capacity": {"x": 50.22, "y": 76.08, "size": 141}, "ability3_atk": {"x": 12.11, "y": 92.45, "size": 141}, "ability3_def": {"x": 37.56, "y": 92.52, "size": 141}, "ability3_leth": {"x": 62.89, "y": 92.45, "size": 141}, "ability3_hp": {"x": 88.11, "y": 92.52, "size": 142}}, "spear": {"unlock": {"x": 49.89, "y": 10.13, "size": 160}, "ability1_atk": {"x": 12.11, "y": 26.58, "size": 143}, "ability1_def": {"x": 37.11, "y": 26.51, "size": 143}, "ability1_leth": {"x": 61.89, "y": 26.51, "size": 144}, "ability1_hp": {"x": 87.67, "y": 26.58, "size": 143}, "skill": {"x": 49.78, "y": 44.65, "size": 160}, "ability2_atk": {"x": 12.11, "y": 61.22, "size": 144}, "ability2_def": {"x": 37.11, "y": 61.16, "size": 144}, "ability2_leth": {"x": 61.56, "y": 61.28, "size": 144}, "ability2_hp": {"x": 87.44, "y": 61.28, "size": 144}, "capacity": {"x": 49.56, "y": 78.42, "size": 144}, "ability3_atk": {"x": 12.11, "y": 93.24, "size": 144}, "ability3_def": {"x": 37, "y": 93.18, "size": 144}, "ability3_leth": {"x": 61.78, "y": 93.18, "size": 144}, "ability3_hp": {"x": 87.44, "y": 93.05, "size": 144}}};
const imageMap = {
  shield:"S__123273220_0.jpg",
  bow:"S__123273221_0.jpg",
  spear:"S__123273222_0.jpg"
};
const troopName = {shield:"盾", bow:"弓", spear:"槍"};
const nodeName = {
  unlock:"T12解放",
  ability1_atk:"能力Ⅰ 攻撃",
  ability1_def:"能力Ⅰ 防御",
  ability1_leth:"能力Ⅰ 殺傷",
  ability1_hp:"能力Ⅰ HP",
  skill:"スキル",
  ability2_atk:"能力Ⅱ 攻撃",
  ability2_def:"能力Ⅱ 防御",
  ability2_leth:"能力Ⅱ 殺傷",
  ability2_hp:"能力Ⅱ HP",
  capacity:"容量",
  ability3_atk:"能力Ⅲ 攻撃",
  ability3_def:"能力Ⅲ 防御",
  ability3_leth:"能力Ⅲ 殺傷",
  ability3_hp:"能力Ⅲ HP"
};
const maxLv = {
  unlock:1, skill:3, capacity:15,
  ability1_atk:20, ability1_def:20, ability1_leth:20, ability1_hp:20,
  ability2_atk:50, ability2_def:50, ability2_leth:50, ability2_hp:50,
  ability3_atk:50, ability3_def:50, ability3_leth:50, ability3_hp:50
};
let troop = "shield";
let selected = "unlock";
let goal = "unlock";
const state = {
  shield: makeState(),
  bow: makeState(),
  spear: makeState()
};

function makeState(){
  const s = {};
  Object.keys(nodeName).forEach(k => s[k] = { current:0, target:0 });
  return s;
}

const goalPreset = {
  unlock: {
    unlock:1,
    ability1_atk:0, ability1_def:0, ability1_leth:0, ability1_hp:0,
    skill:0,
    ability2_atk:0, ability2_def:0, ability2_leth:0, ability2_hp:0,
    capacity:0,
    ability3_atk:0, ability3_def:0, ability3_leth:0, ability3_hp:0
  },
  skill: {
    unlock:1,
    ability1_atk:20, ability1_def:20, ability1_leth:20, ability1_hp:20,
    skill:3,
    ability2_atk:0, ability2_def:0, ability2_leth:0, ability2_hp:0,
    capacity:0,
    ability3_atk:0, ability3_def:0, ability3_leth:0, ability3_hp:0
  },

function quickMap(key){
  return {
    ability1_max:["ability1_atk","ability1_def","ability1_leth","ability1_hp"],
    skill_max:["skill"],
    ability2_max:["ability2_atk","ability2_def","ability2_leth","ability2_hp"],
    capacity_max:["capacity"]
  }[key] || [];
}

function isQuickApplied(key){
  return quickMap(key).every(n => state[troop][n].current >= maxLv[n]);
}

function renderQuickButtons(){
  document.querySelectorAll(".quick-btn").forEach(x=>x.remove());

  Object.keys(quickButtonName).forEach(k=>{
    const d = quickButtonData[troop][k];
    const b = document.createElement("button");
    b.className = "quick-btn" + (isQuickApplied(k) ? " selected" : "");
    b.dataset.key = k;
    b.innerHTML = quickButtonName[k].replace("\\n", "<br>");
    b.style.left = d.x + "%";
    b.style.top = d.y + "%";
    b.style.width = d.w + "px";
    b.style.height = d.h + "px";
    b.addEventListener("click", e=>{
      e.stopPropagation();
      applyQuickAction(k);
    });
    wrap.appendChild(b);
  });
}

function applyQuickAction(key){
  const keys = quickMap(key);
  const already = isQuickApplied(key);
  keys.forEach(n=>{
    state[troop][n].current = already ? 0 : maxLv[n];
  });
  normalizePrereqFor("current");
  renderTotalResult();
  renderQuickButtons();
}


function makeOptions(max){
  let s="";
  for(let i=0;i<=max;i++) s += `<option value="${i}">Lv${i}</option>`;
  return s;
}

function renderMarkers(){
  const imgEl = document.getElementById("treeImage");
  if(!imgEl.clientWidth){
    imgEl.addEventListener("load", renderMarkers, {once:true});
    return;
  }
  document.querySelectorAll(".marker").forEach(m=>m.remove());
  const layout = layouts[troop];
  const scale = imgEl.clientWidth / 900;
  Object.keys(nodeName).forEach(k=>{
    const p = layout[k];
    if(!p){ console.warn("layout missing: "+k); return; }
    const m = document.createElement("button");
    m.className = "marker" + (k===selected ? " selected" : "");
    m.dataset.key = k;
    m.innerHTML = nodeName[k].replace(" ","<br>");
    m.style.left = p.x + "%";
    m.style.top = p.y + "%";
    const displaySize = Math.max(32, p.size * scale);
    m.style.width = displaySize + "px";
    m.style.height = displaySize + "px";
    m.addEventListener("click",()=>{
      if(selected === k && document.getElementById("nodeEditor").classList.contains("open")){
        selected = "";
        closeEditor();
        renderMarkers();
        return;
      }
      selected = k;
      renderMarkers();
      focusRow(k);
    });
    wrap.appendChild(m);
  });
  renderQuickButtons();
}

function renderTable(){
  renderTotalResult();
}

function focusRow(k){
  selected = k;
  renderMarkers();
  openEditor(k);
}


function makeEditorOptions(max, value){
  let s = "";
  for(let i=0;i<=max;i++){
    s += `<option value="${i}" ${i===value ? "selected" : ""}>Lv${i}${i===0 ? "（未解放）" : ""}</option>`;
  }
  return s;
}

function openEditor(k){
  const editor = document.getElementById("nodeEditor");
  document.getElementById("editorTitle").textContent = nodeName[k];
  const cur = document.getElementById("editorCurrent");
  const tar = document.getElementById("editorTarget");
  cur.innerHTML = makeEditorOptions(maxLv[k], state[troop][k].current);
  tar.innerHTML = makeEditorOptions(maxLv[k], state[troop][k].target);
  cur.onchange = e => {
    state[troop][k].current = Number(e.target.value);
    normalizePrereqFor("current");
    openEditor(k);
    renderTotalResult();
  };
  tar.onchange = e => {
    state[troop][k].target = Number(e.target.value);
    normalizePrereqFor("target");
    openEditor(k);
    renderTotalResult();
  };
  document.getElementById("editorMaxCurrent").onclick = () => {
    state[troop][k].current = maxLv[k];
    normalizePrereqFor("current");
    openEditor(k);
    renderTotalResult();
  };
  document.getElementById("editorMaxTarget").onclick = () => {
    state[troop][k].target = maxLv[k];
    normalizePrereqFor("target");
    openEditor(k);
    renderTotalResult();
  };
  editor.classList.add("open");
}

function closeEditor(){
  document.getElementById("nodeEditor").classList.remove("open");
}

function calculateAndScroll(){
  renderTotalResult();
  closeEditor();
  const result = document.getElementById("totalResult");
  if(result){
    result.scrollIntoView({behavior:"smooth", block:"start"});
  }
}


function switchTroop(t){
  troop = t;
  selected = "unlock";
  img.src = imageMap[troop];
  document.querySelectorAll(".troop").forEach(b=>b.classList.toggle("active", b.dataset.troop===troop));
  renderTable();
  renderMarkers();
  syncQuickControls();
  closeEditor();
}
