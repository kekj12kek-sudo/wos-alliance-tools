<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>T12研究ページ</title>
<style>
*{box-sizing:border-box}
body{margin:0;background:#111827;color:#fff;font-family:Arial,"Yu Gothic",Meiryo,sans-serif}
header{position:sticky;top:0;z-index:20;background:#182235;border-bottom:1px solid #334155;padding:12px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
button,select{padding:9px 12px;border-radius:10px;border:1px solid #475569;background:#1f2937;color:#fff;font-weight:700}
button.active{background:#b45309;border-color:#f59e0b}.goal.active{background:#166534;border-color:#22c55e}
.main{display:grid;grid-template-columns:minmax(360px,1fr) 420px;gap:12px;padding:12px}
.stage{background:#0b1220;border:1px solid #334155;border-radius:12px;overflow:auto;padding:8px}
#treeWrap{position:relative;display:inline-block;line-height:0}
#treeImage{display:block;width:900px;max-width:none;height:auto}
.marker{position:absolute;transform:translate(-50%,-50%);border-radius:50%;background:rgba(37,99,235,.22);border:3px solid rgba(255,255,255,.85);display:flex;align-items:center;justify-content:center;text-align:center;line-height:1.1;font-size:10px;font-weight:900;color:#fff;text-shadow:0 1px 3px #000;cursor:pointer;z-index:5}
.marker:hover,.marker.selected{background:rgba(245,158,11,.42);border-color:#fde68a}
.side{background:#0f172a;border:1px solid #334155;border-radius:12px;padding:14px}
h2,h3{margin-top:0}
.info{color:#cbd5e1;line-height:1.6;font-size:14px}
.level-row{display:grid;grid-template-columns:1fr 90px 90px;gap:8px;align-items:center;padding:8px;border-bottom:1px solid #1f2937}
.level-row.active{background:#1e293b;outline:2px solid #f59e0b;border-radius:10px}
.level-row label{font-weight:700;font-size:13px}
.level-row select{width:100%;padding:7px}
@media(max-width:900px){.main{grid-template-columns:1fr}.side{order:-1}#treeImage{width:1000px}}
</style>
</head>
<body>
<header>
<strong>T12研究ページ / 固定マーカー版</strong>
<button class="troop active" data-troop="shield">盾</button>
<button class="troop" data-troop="bow">弓</button>
<button class="troop" data-troop="spear">槍</button>
<span style="width:1px;height:28px;background:#475569;display:inline-block"></span>
<button class="goal active" data-goal="unlock">T12解放まで</button>
<button class="goal" data-goal="skill">スキル解放まで</button>
<button class="goal" data-goal="max">カンストまで</button>
</header>

<div class="main">
<section class="stage">
  <div id="treeWrap">
    <img id="treeImage" src="S__123273220_0.jpg" alt="T12研究ツリー">
  </div>
</section>

<aside class="side">
  <h2 id="title">盾の研究設定</h2>
  <p class="info">大枠目標を選ぶと、目標Lvが一括で入ります。マーカーをタップすると該当項目へ移動します。</p>
  <div id="goalSummary" class="info" style="background:#111827;border:1px solid #334155;border-radius:10px;padding:10px;margin-bottom:10px"></div>
  <div id="levelTable"></div>
</aside>
</div>

<script>
const layouts = {"shield": {"unlock": {"x": 50.11, "y": 6.99, "size": 160}, "ability1_atk": {"x": 11.56, "y": 23.97, "size": 139}, "ability1_def": {"x": 36.89, "y": 23.91, "size": 137}, "ability1_leth": {"x": 62.44, "y": 23.91, "size": 139}, "ability1_hp": {"x": 88.33, "y": 23.91, "size": 142}, "skill": {"x": 50, "y": 41.2, "size": 160}, "ability2_atk": {"x": 11.89, "y": 58.62, "size": 139}, "ability2_def": {"x": 37.11, "y": 58.56, "size": 136}, "ability2_leth": {"x": 62.56, "y": 58.68, "size": 139}, "ability2_hp": {"x": 88.22, "y": 58.56, "size": 141}, "capacity": {"x": 50.11, "y": 76.6, "size": 134}, "ability3_atk": {"x": 11.56, "y": 93.46, "size": 139}, "ability3_def": {"x": 37.11, "y": 93.27, "size": 137}, "ability3_leth": {"x": 62.67, "y": 93.46, "size": 142}, "ability3_hp": {"x": 88.33, "y": 93.46, "size": 142}}, "bow": {"unlock": {"x": 50.44, "y": 10.11, "size": 158}, "ability1_atk": {"x": 12.11, "y": 25.55, "size": 144}, "ability1_def": {"x": 37.56, "y": 25.42, "size": 147}, "ability1_leth": {"x": 62.89, "y": 25.42, "size": 143}, "ability1_hp": {"x": 88.33, "y": 25.61, "size": 149}, "skill": {"x": 50.44, "y": 42.54, "size": 158}, "ability2_atk": {"x": 12.22, "y": 59.09, "size": 141}, "ability2_def": {"x": 37.44, "y": 59.16, "size": 143}, "ability2_leth": {"x": 62.89, "y": 59.16, "size": 141}, "ability2_hp": {"x": 88, "y": 59.03, "size": 142}, "capacity": {"x": 50.22, "y": 76.08, "size": 141}, "ability3_atk": {"x": 12.11, "y": 92.45, "size": 141}, "ability3_def": {"x": 37.56, "y": 92.52, "size": 141}, "ability3_leth": {"x": 62.89, "y": 92.45, "size": 141}, "ability3_hp": {"x": 88.11, "y": 92.52, "size": 142}}, "spear": {"unlock": {"x": 49.89, "y": 10.13, "size": 160}, "ability1_atk": {"x": 12.11, "y": 26.58, "size": 143}, "ability1_def": {"x": 37.11, "y": 26.51, "size": 143}, "ability1_leth": {"x": 61.89, "y": 26.51, "size": 144}, "ability1_hp": {"x": 87.67, "y": 26.58, "size": 143}, "skill": {"x": 49.78, "y": 44.65, "size": 160}, "ability2_atk": {"x": 12.11, "y": 61.22, "size": 144}, "ability2_def": {"x": 37.11, "y": 61.16, "size": 144}, "ability2_leth": {"x": 61.56, "y": 61.28, "size": 144}, "ability2_hp": {"x": 87.44, "y": 61.28, "size": 144}, "capacity": {"x": 49.56, "y": 78.42, "size": 144}, "ability3_atk": {"x": 12.11, "y": 93.24, "size": 144}, "ability3_def": {"x": 37, "y": 93.18, "size": 144}, "ability3_leth": {"x": 61.78, "y": 93.18, "size": 144}, "ability3_hp": {"x": 87.44, "y": 93.05, "size": 144}}};
const imageMap = {
  shield:"S__123273220_0.jpg",
  bow:"S__123273221_0.jpg",
  spear:"S__123273222_0.jpg"
};
const troopName = {shield:"盾", bow:"弓", spear:"槍"};
const nodeName = {
  unlock:"T12解放",
  ability1_atk:"能力Ⅰ 攻撃",
  ability1_def:"能力Ⅰ 防御",
  ability1_leth:"能力Ⅰ 殺傷",
  ability1_hp:"能力Ⅰ HP",
  skill:"スキル",
  ability2_atk:"能力Ⅱ 攻撃",
  ability2_def:"能力Ⅱ 防御",
  ability2_leth:"能力Ⅱ 殺傷",
  ability2_hp:"能力Ⅱ HP",
  capacity:"容量",
  ability3_atk:"能力Ⅲ 攻撃",
  ability3_def:"能力Ⅲ 防御",
  ability3_leth:"能力Ⅲ 殺傷",
  ability3_hp:"能力Ⅲ HP"
};
const maxLv = {
  unlock:1, skill:3, capacity:15,
  ability1_atk:20, ability1_def:20, ability1_leth:20, ability1_hp:20,
  ability2_atk:50, ability2_def:50, ability2_leth:50, ability2_hp:50,
  ability3_atk:50, ability3_def:50, ability3_leth:50, ability3_hp:50
};
let troop = "shield";
let selected = "unlock";
let goal = "unlock";
const state = {
  shield: makeState(),
  bow: makeState(),
  spear: makeState()
};

function makeState(){
  const s = {};
  Object.keys(nodeName).forEach(k => s[k] = { current:0, target:0 });
  return s;
}

const goalPreset = {
  unlock: {
    unlock:1,
    ability1_atk:0, ability1_def:0, ability1_leth:0, ability1_hp:0,
    skill:0,
    ability2_atk:0, ability2_def:0, ability2_leth:0, ability2_hp:0,
    capacity:0,
    ability3_atk:0, ability3_def:0, ability3_leth:0, ability3_hp:0
  },
  skill: {
    unlock:1,
    ability1_atk:20, ability1_def:20, ability1_leth:20, ability1_hp:20,
    skill:3,
    ability2_atk:0, ability2_def:0, ability2_leth:0, ability2_hp:0,
    capacity:0,
    ability3_atk:0, ability3_def:0, ability3_leth:0, ability3_hp:0
  },
  max: {
    unlock:1,
    ability1_atk:20, ability1_def:20, ability1_leth:20, ability1_hp:20,
    skill:3,
    ability2_atk:50, ability2_def:50, ability2_leth:50, ability2_hp:50,
    capacity:15,
    ability3_atk:50, ability3_def:50, ability3_leth:50, ability3_hp:50
  }
};

const goalLabel = {
  unlock: "T12解放まで",
  skill: "スキル解放まで",
  max: "カンストまで"
};

function applyGoalToTroop(){
  const preset = goalPreset[goal];
  Object.keys(preset).forEach(k => {
    state[troop][k].target = preset[k];
  });
}
const wrap = document.getElementById("treeWrap");
const img = document.getElementById("treeImage");

function makeOptions(max){
  let s="";
  for(let i=0;i<=max;i++) s += `<option value="${i}">Lv${i}</option>`;
  return s;
}

function renderMarkers(){
  document.querySelectorAll(".marker").forEach(m=>m.remove());
  const layout = layouts[troop];
  Object.keys(nodeName).forEach(k=>{
    const p = layout[k];
    const m = document.createElement("button");
    m.className = "marker" + (k===selected ? " selected" : "");
    m.dataset.key = k;
    m.innerHTML = nodeName[k].replace(" ","<br>");
    m.style.left = p.x + "%";
    m.style.top = p.y + "%";
    m.style.width = p.size + "px";
    m.style.height = p.size + "px";
    m.addEventListener("click",()=>{
      selected = k;
      renderMarkers();
      focusRow(k);
    });
    wrap.appendChild(m);
  });
}

function renderTable(){
  document.getElementById("title").textContent = troopName[troop] + "の研究設定";
  document.getElementById("goalSummary").innerHTML =
    "選択中の大枠目標：<b>" + goalLabel[goal] + "</b><br>" +
    "現在Lvは手動、目標Lvは大枠ボタンで一括反映できます。";
  const box = document.getElementById("levelTable");
  box.innerHTML = `
    <div class="level-row" style="font-weight:900;color:#cbd5e1">
      <label>研究項目</label><div>現在Lv</div><div>目標Lv</div>
    </div>
  ` + Object.keys(nodeName).map(k=>`
    <div class="level-row" data-row="${k}">
      <label>${nodeName[k]}</label>
      <select data-type="current" data-key="${k}">${makeOptions(maxLv[k])}</select>
      <select data-type="target" data-key="${k}">${makeOptions(maxLv[k])}</select>
    </div>
  `).join("");

  document.querySelectorAll("#levelTable select").forEach(sel=>{
    const key = sel.dataset.key;
    const type = sel.dataset.type;
    sel.value = state[troop][key][type];
    sel.addEventListener("change", e=>{
      state[troop][key][type] = Number(e.target.value);
    });
  });
}

function focusRow(k){
  document.querySelectorAll(".level-row").forEach(r=>r.classList.toggle("active", r.dataset.row===k));
  const row = document.querySelector(`[data-row="${k}"]`);
  if(row) row.scrollIntoView({behavior:"smooth",block:"center"});
}

function switchTroop(t){
  troop = t;
  selected = "unlock";
  img.src = imageMap[troop];
  document.querySelectorAll(".troop").forEach(b=>b.classList.toggle("active", b.dataset.troop===troop));
  renderTable();
  renderMarkers();
  focusRow(selected);
}

document.querySelectorAll(".goal").forEach(b=>b.addEventListener("click",()=>{
  goal = b.dataset.goal;
  document.querySelectorAll(".goal").forEach(x=>x.classList.toggle("active", x.dataset.goal===goal));
  applyGoalToTroop();
  renderTable();
  focusRow(selected);
}));

document.querySelectorAll(".troop").forEach(b=>b.addEventListener("click",()=>switchTroop(b.dataset.troop)));

applyGoalToTroop();
renderTable();
renderMarkers();
focusRow(selected);
</script>
</body>
</html>
