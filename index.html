<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>T12研究ページ</title>
<style>
*{box-sizing:border-box}
body{margin:0;background:#111827;color:#fff;font-family:Arial,"Yu Gothic",Meiryo,sans-serif}
header{position:sticky;top:0;z-index:20;background:#182235;border-bottom:1px solid #334155;padding:12px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
button,select{padding:9px 12px;border-radius:10px;border:1px solid #475569;background:#1f2937;color:#fff;font-weight:700}
button.active{background:#b45309;border-color:#f59e0b}.goal.active{background:#166534;border-color:#22c55e}
.main{display:grid;grid-template-columns:minmax(360px,1fr) 420px;gap:12px;padding:12px}
.stage{background:#0b1220;border:1px solid #334155;border-radius:12px;overflow:auto;padding:8px}
#treeWrap{position:relative;display:inline-block;line-height:0}
#treeImage{display:block;width:900px;max-width:none;height:auto}
.marker{position:absolute;transform:translate(-50%,-50%);border-radius:50%;background:rgba(37,99,235,.22);border:3px solid rgba(255,255,255,.85);display:flex;align-items:center;justify-content:center;text-align:center;line-height:1.1;font-size:10px;font-weight:900;color:#fff;text-shadow:0 1px 3px #000;cursor:pointer;z-index:5}
.marker:hover,.marker.selected{background:rgba(245,158,11,.42);border-color:#fde68a}
.side{background:#0f172a;border:1px solid #334155;border-radius:12px;padding:14px}
.node-editor{display:none;position:fixed;left:50%;bottom:18px;transform:translateX(-50%);z-index:100;background:#0f172a;border:2px solid #f59e0b;border-radius:16px;padding:14px;box-shadow:0 18px 50px rgba(0,0,0,.45);width:min(92vw,420px)}
.node-editor.open{display:block}
.node-editor h3{margin:0 0 10px}
.editor-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.editor-row label{display:block;color:#cbd5e1;font-size:12px;margin-bottom:4px}
.editor-row select{width:100%}
.editor-actions{display:flex;gap:8px;justify-content:flex-end}
.editor-actions button{padding:8px 12px}
h2,h3{margin-top:0}
.info{color:#cbd5e1;line-height:1.6;font-size:14px}
.goal-result{background:#0b1220;border:1px solid #334155;border-radius:12px;padding:12px;margin-bottom:12px}
.goal-result h3{margin:0 0 8px;font-size:16px}
.tree-troops{display:flex;gap:8px;margin:0 0 10px;flex-wrap:wrap}
.total-box{background:#0b1220;border:1px solid #334155;border-radius:12px;padding:12px;margin-bottom:12px}
.result-table{width:100%;border-collapse:collapse;margin-top:8px}
.result-table th,.result-table td{border-bottom:1px solid #334155;padding:7px;text-align:right}
.result-table th:first-child,.result-table td:first-child{text-align:left}
.warn{color:#fbbf24;font-size:13px;line-height:1.5;margin-top:8px}
.count-tabs{display:flex;gap:8px;margin:8px 0 12px}
.count-tab{padding:8px 12px;border-radius:10px;border:1px solid #475569;background:#1f2937;color:#fff;font-weight:800;cursor:pointer}
.count-tab.active{background:#166534;border-color:#22c55e}
.material-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.material-card{background:#111827;border:1px solid #334155;border-radius:10px;padding:10px}
.material-card .label{color:#94a3b8;font-size:12px}
.material-card .value{font-size:20px;font-weight:900;margin-top:4px}
@media(max-width:700px){.material-grid{grid-template-columns:1fr}}
.preset-box{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0 12px}
.preset-btn{padding:8px 10px;border-radius:10px;border:1px solid #475569;background:#1f2937;color:#fff;font-weight:800;cursor:pointer}
.preset-btn:hover{background:#334155}
.level-row{display:grid;grid-template-columns:1fr 90px 90px;gap:8px;align-items:center;padding:8px;border-bottom:1px solid #1f2937}
.level-row.active{background:#1e293b;outline:2px solid #f59e0b;border-radius:10px}
.level-row label{font-weight:700;font-size:13px}
.level-row select{width:100%;padding:7px}
@media(max-width:900px){.main{grid-template-columns:1fr}.side{order:-1}#treeImage{width:1000px}}
</style>
</head>
<body>
<header>
<strong>T12研究ページ / 固定マーカー版</strong>
<button class="goal active" data-goal="unlock">T12解放まで</button>
<button class="goal" data-goal="skill">スキル解放まで</button>
<button class="goal" data-goal="max">カンストまで</button>
</header>

<div class="main">
<section>
  <div class="total-box">
    <h3>全兵種 合算不足分</h3>
    <div class="info">盾・弓・槍それぞれの現在Lvと目標Lvから、不足素材を合算します。</div>
    <div id="totalResult"></div>
  </div>

  <div class="goal-result">
    <h3>大枠目標の必要素材</h3>
    <div class="info">基本は1兵種分です。タブで2兵種・3兵種の合計へ切替できます。</div>
    <div class="count-tabs">
      <button class="count-tab active" data-count="1">1兵種</button>
      <button class="count-tab" data-count="2">2兵種</button>
      <button class="count-tab" data-count="3">3兵種</button>
    </div>
    <div id="goalResult"></div>
  </div>
  <div class="tree-troops">
    <button class="troop active" data-troop="shield">盾</button>
    <button class="troop" data-troop="bow">弓</button>
    <button class="troop" data-troop="spear">槍</button>
  </div>
  <div class="stage">
  <div id="treeWrap">
    <img id="treeImage" src="S__123273220_0.jpg" alt="T12研究ツリー">
  </div>
</div>
</section>

<aside class="side">
  <h2 id="title">盾の研究設定</h2>
  <p class="info">スキルツリー上のマーカーをタップすると、その項目だけ設定できます。全項目の常時表示はしません。</p>
  <div id="goalSummary" class="info" style="background:#111827;border:1px solid #334155;border-radius:10px;padding:10px;margin-bottom:10px"></div>
  <div class="warn">前提条件：能力ⅠがMAXでないとスキルへ進めません。能力ⅡがMAXでないと容量MAXへ進めません。容量MAXでないと能力Ⅲへ進めません。</div>

  <div class="info" style="font-weight:900;margin-bottom:4px">現在の研究状況を簡単設定</div>
  <div class="preset-box">
    <button class="preset-btn current-set" data-current="zero">未解放</button>
    <button class="preset-btn current-set" data-current="unlock">T12解放済み</button>
    <button class="preset-btn current-set" data-current="skill">スキルまで研究済み</button>
    <button class="preset-btn current-set" data-current="max">カンスト済み</button>
  </div>

  <div class="info" style="font-weight:900;margin-bottom:4px">目標を簡単設定</div>
  <div class="preset-box">
    <button class="preset-btn target-set" data-target="unlock">T12解放まで</button>
    <button class="preset-btn target-set" data-target="skill">スキル解放まで</button>
    <button class="preset-btn target-set" data-target="max">カンストまで</button>
  </div>
</aside>

<div id="nodeEditor" class="node-editor">
  <h3 id="editorTitle">研究設定</h3>
  <div class="editor-row">
    <div>
      <label>現在Lv</label>
      <select id="editorCurrent"></select>
    </div>
    <div>
      <label>目標Lv</label>
      <select id="editorTarget"></select>
    </div>
  </div>
  <div class="editor-actions">
    <button id="editorMaxCurrent">現在をMAX</button>
    <button id="editorClose">閉じる</button>
  </div>
</div>
</div>

<script>

const GOAL_COSTS = {
  unlock: { label:"T12解放まで", steel:1620000, refined:440, particle:3080 },
  skill:  { label:"スキル解放まで", steel:4263000, refined:898, particle:6235 },
  max:    { label:"カンストまで", steel:17774250, refined:3895, particle:67944 }
};
let resultTroopCount = 1;


function renderGoalResult(){
  const c = GOAL_COSTS[goal];
  const count = resultTroopCount;
  document.getElementById("goalResult").innerHTML = `
    <div class="material-grid">
      <div class="material-card"><div class="label">精錬火晶</div><div class="value">${fmt(c.refined * count)}</div></div>
      <div class="material-card"><div class="label">火晶微粒子</div><div class="value">${fmt(c.particle * count)}</div></div>
      <div class="material-card"><div class="label">鋼材</div><div class="value">${fmt(c.steel * count)}</div></div>
    </div>
  `;
}


const COSTS = {
  unlock: { refined:440, particle:3080, steel:1620000 },
  ability1_each: { refined:77, particle:545, steel:510750 },
  skill: { refined:150, particle:975, steel:600000 },
  ability2_each: { refined:360, particle:5610, steel:1350000 },
  capacity: { refined:117, particle:1829, steel:611250 },
  ability3_each: { refined:360, particle:9360, steel:1875000 }
};

function costForNode(key, lv){
  lv = Number(lv) || 0;
  if(lv <= 0) return {refined:0, particle:0, steel:0};
  if(key === "unlock"){
    return scaleCost(COSTS.unlock, lv / 1);
  }
  if(key.startsWith("ability1_")){
    return scaleCost(COSTS.ability1_each, lv / 20);
  }
  if(key === "skill"){
    return scaleCost(COSTS.skill, lv / 3);
  }
  if(key.startsWith("ability2_")){
    return scaleCost(COSTS.ability2_each, lv / 50);
  }
  if(key === "capacity"){
    return scaleCost(COSTS.capacity, lv / 15);
  }
  if(key.startsWith("ability3_")){
    return scaleCost(COSTS.ability3_each, lv / 50);
  }
  return {refined:0, particle:0, steel:0};
}

function scaleCost(c, rate){
  return {
    refined: c.refined * rate,
    particle: c.particle * rate,
    steel: c.steel * rate
  };
}

function addCost(a,b){
  a.refined += b.refined || 0;
  a.particle += b.particle || 0;
  a.steel += b.steel || 0;
  return a;
}

function fmt(n){
  if(n >= 100000000) return (n/100000000).toFixed(2).replace(/\.00$/,"") + "億";
  if(n >= 1000000) return (n/1000000).toFixed(2).replace(/\.00$/,"") + "M";
  return Math.ceil(n).toLocaleString("ja-JP");
}

function normalizePrereqFor(type){
  const s = state[troop];

  // スキル以上 → 解放 + 能力Ⅰ4種MAX
  if(s.skill[type] > 0 || hasAny(type, ["ability2_atk","ability2_def","ability2_leth","ability2_hp","capacity","ability3_atk","ability3_def","ability3_leth","ability3_hp"])){
    s.unlock[type] = Math.max(s.unlock[type], 1);
    ["ability1_atk","ability1_def","ability1_leth","ability1_hp"].forEach(k => s[k][type] = Math.max(s[k][type], 20));
  }

  // 能力Ⅱ以上 → スキルMAX
  if(hasAny(type, ["ability2_atk","ability2_def","ability2_leth","ability2_hp","capacity","ability3_atk","ability3_def","ability3_leth","ability3_hp"])){
    s.skill[type] = Math.max(s.skill[type], 3);
  }

  // 容量以上 → 能力Ⅱ4種MAX
  if(s.capacity[type] > 0 || hasAny(type, ["ability3_atk","ability3_def","ability3_leth","ability3_hp"])){
    ["ability2_atk","ability2_def","ability2_leth","ability2_hp"].forEach(k => s[k][type] = Math.max(s[k][type], 50));
  }

  // 能力Ⅲ → 容量MAX
  if(hasAny(type, ["ability3_atk","ability3_def","ability3_leth","ability3_hp"])){
    s.capacity[type] = Math.max(s.capacity[type], 15);
  }
}

function hasAny(type, keys){
  return keys.some(k => state[troop][k][type] > 0);
}

function shortageForTroop(t){
  const total = {refined:0, particle:0, steel:0};
  Object.keys(nodeName).forEach(k=>{
    const cur = state[t][k].current || 0;
    const tar = state[t][k].target || 0;
    const diff = Math.max(0, tar - cur);
    const c1 = costForNode(k, cur);
    const c2 = costForNode(k, cur + diff);
    addCost(total, {
      refined: c2.refined - c1.refined,
      particle: c2.particle - c1.particle,
      steel: c2.steel - c1.steel
    });
  });
  return total;
}

function renderTotalResult(){
  const rows = ["shield","bow","spear"].map(t=>{
    const r = shortageForTroop(t);
    return `<tr><td>${troopName[t]}</td><td>${fmt(r.refined)}</td><td>${fmt(r.particle)}</td><td>${fmt(r.steel)}</td></tr>`;
  }).join("");

  const total = {refined:0, particle:0, steel:0};
  ["shield","bow","spear"].forEach(t=>addCost(total, shortageForTroop(t)));

  document.getElementById("totalResult").innerHTML = `
    <table class="result-table">
      <thead><tr><th>対象</th><th>精錬火晶</th><th>火晶微粒子</th><th>鋼材</th></tr></thead>
      <tbody>
        ${rows}
        <tr style="font-weight:900;color:#86efac"><td>合計</td><td>${fmt(total.refined)}</td><td>${fmt(total.particle)}</td><td>${fmt(total.steel)}</td></tr>
      </tbody>
    </table>
  `;
}

const layouts = {"shield": {"unlock": {"x": 50.11, "y": 6.99, "size": 160}, "ability1_atk": {"x": 11.56, "y": 23.97, "size": 139}, "ability1_def": {"x": 36.89, "y": 23.91, "size": 137}, "ability1_leth": {"x": 62.44, "y": 23.91, "size": 139}, "ability1_hp": {"x": 88.33, "y": 23.91, "size": 142}, "skill": {"x": 50, "y": 41.2, "size": 160}, "ability2_atk": {"x": 11.89, "y": 58.62, "size": 139}, "ability2_def": {"x": 37.11, "y": 58.56, "size": 136}, "ability2_leth": {"x": 62.56, "y": 58.68, "size": 139}, "ability2_hp": {"x": 88.22, "y": 58.56, "size": 141}, "capacity": {"x": 50.11, "y": 76.6, "size": 134}, "ability3_atk": {"x": 11.56, "y": 93.46, "size": 139}, "ability3_def": {"x": 37.11, "y": 93.27, "size": 137}, "ability3_leth": {"x": 62.67, "y": 93.46, "size": 142}, "ability3_hp": {"x": 88.33, "y": 93.46, "size": 142}}, "bow": {"unlock": {"x": 50.44, "y": 10.11, "size": 158}, "ability1_atk": {"x": 12.11, "y": 25.55, "size": 144}, "ability1_def": {"x": 37.56, "y": 25.42, "size": 147}, "ability1_leth": {"x": 62.89, "y": 25.42, "size": 143}, "ability1_hp": {"x": 88.33, "y": 25.61, "size": 149}, "skill": {"x": 50.44, "y": 42.54, "size": 158}, "ability2_atk": {"x": 12.22, "y": 59.09, "size": 141}, "ability2_def": {"x": 37.44, "y": 59.16, "size": 143}, "ability2_leth": {"x": 62.89, "y": 59.16, "size": 141}, "ability2_hp": {"x": 88, "y": 59.03, "size": 142}, "capacity": {"x": 50.22, "y": 76.08, "size": 141}, "ability3_atk": {"x": 12.11, "y": 92.45, "size": 141}, "ability3_def": {"x": 37.56, "y": 92.52, "size": 141}, "ability3_leth": {"x": 62.89, "y": 92.45, "size": 141}, "ability3_hp": {"x": 88.11, "y": 92.52, "size": 142}}, "spear": {"unlock": {"x": 49.89, "y": 10.13, "size": 160}, "ability1_atk": {"x": 12.11, "y": 26.58, "size": 143}, "ability1_def": {"x": 37.11, "y": 26.51, "size": 143}, "ability1_leth": {"x": 61.89, "y": 26.51, "size": 144}, "ability1_hp": {"x": 87.67, "y": 26.58, "size": 143}, "skill": {"x": 49.78, "y": 44.65, "size": 160}, "ability2_atk": {"x": 12.11, "y": 61.22, "size": 144}, "ability2_def": {"x": 37.11, "y": 61.16, "size": 144}, "ability2_leth": {"x": 61.56, "y": 61.28, "size": 144}, "ability2_hp": {"x": 87.44, "y": 61.28, "size": 144}, "capacity": {"x": 49.56, "y": 78.42, "size": 144}, "ability3_atk": {"x": 12.11, "y": 93.24, "size": 144}, "ability3_def": {"x": 37, "y": 93.18, "size": 144}, "ability3_leth": {"x": 61.78, "y": 93.18, "size": 144}, "ability3_hp": {"x": 87.44, "y": 93.05, "size": 144}}};
const imageMap = {
  shield:"S__123273220_0.jpg",
  bow:"S__123273221_0.jpg",
  spear:"S__123273222_0.jpg"
};
const troopName = {shield:"盾", bow:"弓", spear:"槍"};
const nodeName = {
  unlock:"T12解放",
  ability1_atk:"能力Ⅰ 攻撃",
  ability1_def:"能力Ⅰ 防御",
  ability1_leth:"能力Ⅰ 殺傷",
  ability1_hp:"能力Ⅰ HP",
  skill:"スキル",
  ability2_atk:"能力Ⅱ 攻撃",
  ability2_def:"能力Ⅱ 防御",
  ability2_leth:"能力Ⅱ 殺傷",
  ability2_hp:"能力Ⅱ HP",
  capacity:"容量",
  ability3_atk:"能力Ⅲ 攻撃",
  ability3_def:"能力Ⅲ 防御",
  ability3_leth:"能力Ⅲ 殺傷",
  ability3_hp:"能力Ⅲ HP"
};
const maxLv = {
  unlock:1, skill:3, capacity:15,
  ability1_atk:20, ability1_def:20, ability1_leth:20, ability1_hp:20,
  ability2_atk:50, ability2_def:50, ability2_leth:50, ability2_hp:50,
  ability3_atk:50, ability3_def:50, ability3_leth:50, ability3_hp:50
};
let troop = "shield";
let selected = "unlock";
let goal = "unlock";
const state = {
  shield: makeState(),
  bow: makeState(),
  spear: makeState()
};

function makeState(){
  const s = {};
  Object.keys(nodeName).forEach(k => s[k] = { current:0, target:0 });
  return s;
}

const goalPreset = {
  unlock: {
    unlock:1,
    ability1_atk:0, ability1_def:0, ability1_leth:0, ability1_hp:0,
    skill:0,
    ability2_atk:0, ability2_def:0, ability2_leth:0, ability2_hp:0,
    capacity:0,
    ability3_atk:0, ability3_def:0, ability3_leth:0, ability3_hp:0
  },
  skill: {
    unlock:1,
    ability1_atk:20, ability1_def:20, ability1_leth:20, ability1_hp:20,
    skill:3,
    ability2_atk:0, ability2_def:0, ability2_leth:0, ability2_hp:0,
    capacity:0,
    ability3_atk:0, ability3_def:0, ability3_leth:0, ability3_hp:0
  },
  max: {
    unlock:1,
    ability1_atk:20, ability1_def:20, ability1_leth:20, ability1_hp:20,
    skill:3,
    ability2_atk:50, ability2_def:50, ability2_leth:50, ability2_hp:50,
    capacity:15,
    ability3_atk:50, ability3_def:50, ability3_leth:50, ability3_hp:50
  }
};

const goalLabel = {
  unlock: "T12解放まで",
  skill: "スキル解放まで",
  max: "カンストまで"
};

function applyGoalToTroop(){
  const preset = goalPreset[goal];
  Object.keys(preset).forEach(k => {
    state[troop][k].target = preset[k];
  });
  normalizePrereqFor("target");
}

function applyPresetTo(type, presetName){
  const preset = goalPreset[presetName] || goalPreset.unlock;
  Object.keys(preset).forEach(k => {
    state[troop][k][type] = preset[k];
  });
  normalizePrereqFor(type);
  renderTable();
  focusRow(selected);
}

function setupPresetButtons(){
  document.querySelectorAll(".current-set").forEach(b=>b.addEventListener("click",()=>{
    applyPresetTo("current", b.dataset.current);
  }));
  document.querySelectorAll(".target-set").forEach(b=>b.addEventListener("click",()=>{
    goal = b.dataset.target;
    document.querySelectorAll(".goal").forEach(x=>x.classList.toggle("active", x.dataset.goal===goal));
    applyPresetTo("target", b.dataset.target);
    renderGoalResult();
  }));
}

const wrap = document.getElementById("treeWrap");
const img = document.getElementById("treeImage");

function makeOptions(max){
  let s="";
  for(let i=0;i<=max;i++) s += `<option value="${i}">Lv${i}</option>`;
  return s;
}

function renderMarkers(){
  document.querySelectorAll(".marker").forEach(m=>m.remove());
  const layout = layouts[troop];
  Object.keys(nodeName).forEach(k=>{
    const p = layout[k];
    const m = document.createElement("button");
    m.className = "marker" + (k===selected ? " selected" : "");
    m.dataset.key = k;
    m.innerHTML = nodeName[k].replace(" ","<br>");
    m.style.left = p.x + "%";
    m.style.top = p.y + "%";
    m.style.width = p.size + "px";
    m.style.height = p.size + "px";
    m.addEventListener("click",()=>{
      selected = k;
      renderMarkers();
      focusRow(k);
    });
    wrap.appendChild(m);
  });
}

function renderTable(){
  renderTotalResult();
  document.getElementById("title").textContent = troopName[troop] + "の研究設定";
  document.getElementById("goalSummary").innerHTML =
    "選択中の大枠目標：<b>" + goalLabel[goal] + "</b><br>" +
    "マーカーをタップして、必要な項目だけ現在Lv・目標Lvを設定します。";
}

function focusRow(k){
  selected = k;
  renderMarkers();
  openEditor(k);
}


function makeEditorOptions(max, value){
  let s = "";
  for(let i=0;i<=max;i++){
    s += `<option value="${i}" ${i===value ? "selected" : ""}>Lv${i}${i===0 ? "（未解放）" : ""}</option>`;
  }
  return s;
}

function openEditor(k){
  const editor = document.getElementById("nodeEditor");
  document.getElementById("editorTitle").textContent = nodeName[k];
  const cur = document.getElementById("editorCurrent");
  const tar = document.getElementById("editorTarget");
  cur.innerHTML = makeEditorOptions(maxLv[k], state[troop][k].current);
  tar.innerHTML = makeEditorOptions(maxLv[k], state[troop][k].target);
  cur.onchange = e => {
    state[troop][k].current = Number(e.target.value);
    normalizePrereqFor("current");
    openEditor(k);
    renderTotalResult();
  };
  tar.onchange = e => {
    state[troop][k].target = Number(e.target.value);
    normalizePrereqFor("target");
    openEditor(k);
    renderTotalResult();
  };
  document.getElementById("editorMaxCurrent").onclick = () => {
    state[troop][k].current = maxLv[k];
    normalizePrereqFor("current");
    openEditor(k);
    renderTotalResult();
  };
  editor.classList.add("open");
}

function closeEditor(){
  document.getElementById("nodeEditor").classList.remove("open");
}

function switchTroop(t){
  troop = t;
  selected = "unlock";
  img.src = imageMap[troop];
  document.querySelectorAll(".troop").forEach(b=>b.classList.toggle("active", b.dataset.troop===troop));
  renderTable();
  renderMarkers();
  closeEditor();
}

document.querySelectorAll(".goal").forEach(b=>b.addEventListener("click",()=>{
  goal = b.dataset.goal;
  document.querySelectorAll(".goal").forEach(x=>x.classList.toggle("active", x.dataset.goal===goal));
  applyGoalToTroop();
  renderGoalResult();
  renderTotalResult();
  renderTable();
  focusRow(selected);
}));

document.querySelectorAll(".count-tab").forEach(b=>b.addEventListener("click",()=>{
  resultTroopCount = Number(b.dataset.count);
  document.querySelectorAll(".count-tab").forEach(x=>x.classList.toggle("active", x.dataset.count===String(resultTroopCount)));
  renderGoalResult();
}));

document.querySelectorAll(".troop").forEach(b=>b.addEventListener("click",()=>switchTroop(b.dataset.troop)));
document.getElementById("editorClose").addEventListener("click", closeEditor);
setupPresetButtons();

applyGoalToTroop();
renderGoalResult();
renderTotalResult();
renderTable();
renderMarkers();
</script>
</body>
</html>
