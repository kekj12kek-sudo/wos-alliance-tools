
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>T12座標取得ツール</title>
<style>
body{font-family:sans-serif;background:#111;color:#fff;margin:20px}
img{max-width:100%;border:1px solid #555}
#wrap{position:relative;display:inline-block}
#marker{
position:absolute;width:40px;height:40px;border-radius:50%;
background:rgba(255,0,0,.5);border:3px solid #fff;
transform:translate(-50%,-50%);cursor:move;
}
textarea{width:100%;height:250px;margin-top:10px}
button{padding:8px 12px;margin:4px}
</style>
</head>
<body>
<h2>T12座標取得ツール</h2>

<input type="file" id="imgFile"><br><br>

<div id="wrap">
<img id="img">
<div id="marker"></div>
</div>

<p>
現在ノード:
<b id="nodeName"></b>
</p>

<button onclick="saveNode()">この座標を登録</button>
<button onclick="copyOut()">コピー</button>

<textarea id="out"></textarea>

<script>
const nodes=[
"unlock",
"ability1_atk","ability1_def","ability1_leth","ability1_hp",
"skill",
"ability2_atk","ability2_def","ability2_leth","ability2_hp",
"capacity",
"ability3_atk","ability3_def","ability3_leth","ability3_hp"
];

let idx=0;
let data={};

document.getElementById("nodeName").textContent=nodes[idx];

const marker=document.getElementById("marker");
const wrap=document.getElementById("wrap");

marker.style.left="50%";
marker.style.top="10%";

let drag=false;

marker.onpointerdown=()=>drag=true;
window.onpointerup=()=>drag=false;

wrap.onpointermove=(e)=>{
 if(!drag)return;
 const r=wrap.getBoundingClientRect();
 const x=((e.clientX-r.left)/r.width)*100;
 const y=((e.clientY-r.top)/r.height)*100;
 marker.style.left=x+"%";
 marker.style.top=y+"%";
};

document.getElementById("imgFile").onchange=e=>{
 const f=e.target.files[0];
 if(!f)return;
 document.getElementById("img").src=URL.createObjectURL(f);
};

function saveNode(){
 const x=parseFloat(marker.style.left);
 const y=parseFloat(marker.style.top);

 data[nodes[idx]]={x,y};

 idx++;
 if(idx>=nodes.length){
   alert("全ノード完了");
 }else{
   document.getElementById("nodeName").textContent=nodes[idx];
 }
 document.getElementById("out").value=JSON.stringify(data,null,2);
}

function copyOut(){
 navigator.clipboard.writeText(
 document.getElementById("out").value
 );
 alert("コピーしました");
}
</script>
</body>
</html>
