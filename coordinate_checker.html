<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>T12 座標確認専用</title>
<style>
*{box-sizing:border-box}
body{margin:0;background:#101521;color:#edf2ff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Yu Gothic",Meiryo,sans-serif}
header{padding:14px 16px;background:#171f33;border-bottom:1px solid rgba(255,255,255,.1);position:sticky;top:0;z-index:20}
h1{font-size:18px;margin:0 0 8px}
.controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
button,select,input{border:1px solid rgba(255,255,255,.16);background:#202a44;color:#fff;border-radius:10px;padding:9px 12px;font-weight:700}
button{cursor:pointer}
button.active{background:#6a3d17;border-color:#ffb45c}
main{display:grid;grid-template-columns:minmax(360px,1fr) 420px;gap:12px;padding:12px}
.mapWrap{background:#0b101b;border:1px solid rgba(255,255,255,.1);border-radius:14px;overflow:hidden;position:relative}
#map{position:relative;width:100%}
#treeImg{display:block;width:100%;height:auto}
.marker{position:absolute;width:64px;height:64px;transform:translate(-50%,-50%);border-radius:999px;border:2px solid #ff4747;background:rgba(255,40,40,.28);color:#fff;font-size:11px;font-weight:900;text-align:center;display:flex;align-items:center;justify-content:center;line-height:1.12;cursor:grab;user-select:none;touch-action:none;z-index:5}
.marker:active{cursor:grabbing}
.marker.selected{border-color:#77ff94;background:rgba(80,255,120,.30);box-shadow:0 0 0 3px rgba(80,255,120,.18)}
.side{display:flex;flex-direction:column;gap:12px}
.panel{background:#171f33;border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:12px}
.panel h2{font-size:16px;margin:0 0 10px}
textarea{width:100%;min-height:420px;background:#0b101b;color:#edf2ff;border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:10px;font-family:Consolas,monospace;font-size:12px;line-height:1.45}
.note{color:#b9c4df;font-size:13px;line-height:1.6}
@media(max-width:900px){main{grid-template-columns:1fr}.side{order:-1}textarea{min-height:260px}}
</style>
</head>
<body>
<header>
  <h1>T12 座標確認専用</h1>
  <div class="controls">
    <span>兵種</span>
    <button class="troop active" data-troop="shield">盾</button>
    <button class="troop" data-troop="spear">槍</button>
    <button class="troop" data-troop="bow">弓</button>
    <span>サイズ</span>
    <input id="sizeInput" type="number" value="64" min="24" max="160" step="2">
    <button id="copyBtn">座標コピー</button>
    <button id="resetBtn">初期化</button>
  </div>
</header>

<main>
  <section class="mapWrap">
    <div id="map">
      <img id="treeImg" src="images/shield_tree.jpeg" alt="研究ツリー">
    </div>
  </section>

  <aside class="side">
    <section class="panel">
      <h2>使い方</h2>
      <div class="note">
        1. 兵種を選ぶ<br>
        2. 赤いマーカーを正しい位置へドラッグ<br>
        3. サイズを調整<br>
        4. 座標コピーを押す<br>
        5. コピー内容をそのまま貼ってください
      </div>
    </section>
    <section class="panel">
      <h2>座標一覧</h2>
      <textarea id="output" readonly></textarea>
    </section>
  </aside>
</main>

<script>
const images = {
  shield: "images/shield_tree.jpeg",
  spear: "images/spear_tree.jpeg",
  bow: "images/bow_tree.jpeg"
};

const troopNames = { shield:"盾", spear:"槍", bow:"弓" };

const markerNames = {
  unlock:"T12解放",
  ability1_atk:"能力Ⅰ 攻撃",
  ability1_def:"能力Ⅰ 防御",
  ability1_leth:"能力Ⅰ 殺傷",
  ability1_hp:"能力Ⅰ HP",
  skill:"スキル",
  ability2_atk:"能力Ⅱ 攻撃",
  ability2_def:"能力Ⅱ 防御",
  ability2_leth:"能力Ⅱ 殺傷",
  ability2_hp:"能力Ⅱ HP",
  capacity:"容量",
  ability3_atk:"能力Ⅲ 攻撃",
  ability3_def:"能力Ⅲ 防御",
  ability3_leth:"能力Ⅲ 殺傷",
  ability3_hp:"能力Ⅲ HP"
};

const defaults = {
  unlock:{x:50,y:8},
  ability1_atk:{x:20,y:24}, ability1_def:{x:40,y:24}, ability1_leth:{x:60,y:24}, ability1_hp:{x:80,y:24},
  skill:{x:50,y:40},
  ability2_atk:{x:20,y:56}, ability2_def:{x:40,y:56}, ability2_leth:{x:60,y:56}, ability2_hp:{x:80,y:56},
  capacity:{x:50,y:70},
  ability3_atk:{x:20,y:86}, ability3_def:{x:40,y:86}, ability3_leth:{x:60,y:86}, ability3_hp:{x:80,y:86}
};

let currentTroop = "shield";
let size = 64;
let positions = {
  shield: JSON.parse(JSON.stringify(defaults)),
  spear: JSON.parse(JSON.stringify(defaults)),
  bow: JSON.parse(JSON.stringify(defaults))
};

const map = document.getElementById("map");
const img = document.getElementById("treeImg");
const output = document.getElementById("output");
const sizeInput = document.getElementById("sizeInput");

function makeMarkers(){
  document.querySelectorAll(".marker").forEach(m=>m.remove());
  for(const [key,name] of Object.entries(markerNames)){
    const btn = document.createElement("div");
    btn.className = "marker";
    btn.dataset.key = key;
    btn.innerHTML = name.replace(" ", "<br>");
    map.appendChild(btn);
  }
  applyMarkers();
  setupDrag();
}

function applyMarkers(){
  document.querySelectorAll(".marker").forEach(m=>{
    const key = m.dataset.key;
    const p = positions[currentTroop][key];
    m.style.left = p.x + "%";
    m.style.top = p.y + "%";
    m.style.width = size + "px";
    m.style.height = size + "px";
  });
  sizeInput.value = size;
  refreshOutput();
}

function refreshOutput(){
  const data = {
    troop: currentTroop,
    troopName: troopNames[currentTroop],
    markerSize: size,
    positions: {}
  };
  for(const key of Object.keys(markerNames)){
    data.positions[key] = {
      name: markerNames[key],
      x: Number(positions[currentTroop][key].x.toFixed(2)),
      y: Number(positions[currentTroop][key].y.toFixed(2))
    };
  }

  const lines = [];
  lines.push(`# ${troopNames[currentTroop]} 座標`);
  lines.push(`marker_size: ${size}`);
  lines.push("");
  for(const key of Object.keys(markerNames)){
    const p = data.positions[key];
    lines.push(`${key}\t${p.name}\tx=${p.x}\ty=${p.y}`);
  }
  lines.push("");
  lines.push("JSON");
  lines.push(JSON.stringify({[currentTroop]: data}, null, 2));
  output.value = lines.join("\n");
}

function setupDrag(){
  let active = null;
  document.querySelectorAll(".marker").forEach(m=>{
    m.addEventListener("pointerdown", e=>{
      active = m;
      m.classList.add("selected");
      m.setPointerCapture(e.pointerId);
      e.preventDefault();
    });
    m.addEventListener("pointermove", e=>{
      if(active !== m) return;
      const rect = map.getBoundingClientRect();
      const x = ((e.clientX - rect.left) / rect.width) * 100;
      const y = ((e.clientY - rect.top) / rect.height) * 100;
      const key = m.dataset.key;
      positions[currentTroop][key] = {
        x: Math.max(0, Math.min(100, x)),
        y: Math.max(0, Math.min(100, y))
      };
      applyMarkers();
    });
    m.addEventListener("pointerup", ()=>{
      active = null;
      m.classList.remove("selected");
    });
  });
}

document.querySelectorAll(".troop").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    currentTroop = btn.dataset.troop;
    document.querySelectorAll(".troop").forEach(b=>b.classList.toggle("active", b===btn));
    img.src = images[currentTroop];
    applyMarkers();
  });
});

sizeInput.addEventListener("input", ()=>{
  size = Math.max(24, Math.min(160, Number(sizeInput.value)||64));
  applyMarkers();
});

document.getElementById("copyBtn").addEventListener("click", async ()=>{
  refreshOutput();
  try{
    await navigator.clipboard.writeText(output.value);
    alert("コピーしました");
  }catch(e){
    output.select();
    document.execCommand("copy");
    alert("コピーしました");
  }
});

document.getElementById("resetBtn").addEventListener("click", ()=>{
  if(!confirm("現在の兵種の座標を初期化しますか？")) return;
  positions[currentTroop] = JSON.parse(JSON.stringify(defaults));
  applyMarkers();
});

makeMarkers();
</script>
</body>
</html>
