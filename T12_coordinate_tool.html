<!DOCTYPE html>
<html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>T12座標取得</title>
<style>
body{margin:0;font-family:sans-serif;background:#111;color:#fff}
.top{padding:10px;background:#222;position:sticky;top:0}
#wrap{position:relative;display:inline-block;width:100%}
#img{width:100%;display:block}
.marker{position:absolute;transform:translate(-50%,-50%);background:#f33;color:#fff;padding:4px 6px;font-size:10px;border-radius:6px;cursor:move}
textarea{width:100%;height:260px;background:#000;color:#0f0}
</style></head>
<body>
<div class="top">
<select id="troop">
<option value="shield">盾</option>
<option value="spear">槍</option>
<option value="bow">弓</option>
</select>
<input type="file" id="file">
<button onclick="copyData()">コピー</button>
</div>

<div id="wrap">
<img id="img">
</div>

<textarea id="out"></textarea>

<script>
const names=[
"unlock","ability1_atk","ability1_def","ability1_leth","ability1_hp",
"skill",
"ability2_atk","ability2_def","ability2_leth","ability2_hp",
"capacity",
"ability3_atk","ability3_def","ability3_leth","ability3_hp"
];

const data={shield:{},spear:{},bow:{}};
const wrap=document.getElementById("wrap");

names.forEach((n,i)=>{
 const d=document.createElement("div");
 d.className="marker";
 d.innerText=n;
 d.dataset.name=n;
 d.style.left=(10+(i%4)*20)+"%";
 d.style.top=(10+Math.floor(i/4)*18)+"%";
 wrap.appendChild(d);

 let drag=false;
 d.onpointerdown=()=>drag=true;
 window.onpointerup=()=>drag=false;

 wrap.onpointermove=(e)=>{
   if(!drag)return;
   const r=wrap.getBoundingClientRect();
   const x=((e.clientX-r.left)/r.width)*100;
   const y=((e.clientY-r.top)/r.height)*100;
   d.style.left=x+"%";
   d.style.top=y+"%";
   const troop=document.getElementById("troop").value;
   data[troop][n]={x:+x.toFixed(2),y:+y.toFixed(2)};
   update();
 }
});

document.getElementById("file").onchange=e=>{
 const f=e.target.files[0];
 if(f) document.getElementById("img").src=URL.createObjectURL(f);
}

function update(){
 document.getElementById("out").value=JSON.stringify(data,null,2);
}
function copyData(){
 update();
 navigator.clipboard.writeText(document.getElementById("out").value);
 alert("コピーしました");
}
update();
</script>
</body></html>
